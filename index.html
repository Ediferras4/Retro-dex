<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro DEX</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers/dist/ethers.min.js"></script>

  <style>
    body {
      background: black;
      color: #00ffcc;
      font-family: monospace;
      text-align: center;
      padding-top: 50px;
      margin: 0;
    }

    .box {
      border: 2px solid #00ffcc;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
    }

    button {
      background: black;
      border: 2px solid #00ffcc;
      color: #00ffcc;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      font-family: monospace;
    }

    input {
      width: 90%;
      padding: 8px;
      margin: 5px;
      background: black;
      border: 1px solid #00ffcc;
      color: #00ffcc;
      font-family: monospace;
    }

    #walletStatus {
      margin-top: 15px;
      font-size: 14px;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <h1>🎮 RETRO DEX</h1>

  <div class="box">
    <button onclick="connectWallet()">CONNECT WALLET</button>

    <div id="walletStatus">Wallet não conectada</div>

    <h3>SEND</h3>
    <input id="sendAmount" placeholder="USDC amount" />

    <h3>RECEIVE</h3>
    <input placeholder="GAMEOVER" disabled />

    <button onclick="fakeSwap()">PRESS START</button>
  </div>

  <script>
    async function connectWallet() {
      if (!window.ethereum) {
        alert("Instale ou abra no navegador da MetaMask");
        return;
      }

      try {
        const accounts = await window.ethereum.request({
          method: "eth_requestAccounts"
        });

        const wallet = accounts[0];
        const shortWallet = wallet.slice(0, 6) + "..." + wallet.slice(-4);

        document.getElementById("walletStatus").innerText =
          "Wallet conectada: " + shortWallet;
      } catch (error) {
        alert("Não foi possível conectar a wallet");
      }
    }

    function fakeSwap() {
      alert("Swap ainda é simulado. Vamos ligar o token real depois.");
    }
  </script>

</body>
</html>
