<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro DEX</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>

body {
  margin: 0;
  font-family: monospace;
  background: radial-gradient(circle, #1a0033, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* container */
.dex {
  width: 380px;
  background: #111;
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 25px #00fff7;
}

/* título */
.title {
  text-align: center;
  font-size: 22px;
  color: #00fff7;
  margin-bottom: 15px;
}

/* box padrão */
.box {
  background: #000;
  border: 2px solid #333;
  border-radius: 15px;
  padding: 15px;
  margin-top: 10px;
}

/* label */
.label {
  font-size: 12px;
  color: #aaa;
}

/* input */
.input {
  width: 100%;
  background: transparent;
  border: none;
  color: white;
  font-size: 20px;
  margin-top: 5px;
  outline: none;
}

/* token name */
.token {
  float: right;
  font-size: 14px;
  color: #00fff7;
}

/* botão swap */
.switch {
  width: 40px;
  height: 40px;
  margin: auto;
  margin-top: 10px;
  background: #000;
  border-radius: 50%;
  border: 2px solid #00fff7;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 0 10px #00fff7;
}

/* botão principal */
.btn {
  width: 100%;
  padding: 14px;
  margin-top: 15px;
  border-radius: 15px;
  border: none;
  background: linear-gradient(90deg, #ff00cc, #00fff7);
  color: black;
  font-weight: bold;
  cursor: pointer;
}

/* status */
.status {
  font-size: 12px;
  margin-top: 10px;
  color: #aaa;
  text-align: center;
}

</style>
</head>

<body>

<div class="dex">

<div class="title">🎮 RETRO DEX</div>

<!-- SEND -->
<div class="box">
  <div class="label">SEND <span class="token" id="tokenA">USDC</span></div>
  <input id="amount" class="input" placeholder="0.0">
</div>

<!-- SETA -->
<div class="switch" onclick="toggleTokens()">⇅</div>

<!-- RECEIVE -->
<div class="box">
  <div class="label">RECEIVE <span class="token" id="tokenB">GAMEOVER</span></div>
  <input class="input" id="output" placeholder="0.0" disabled>
</div>

<button class="btn" onclick="connectWallet()">CONNECT WALLET</button>
<button class="btn" onclick="fakeSwap()">SWAP</button>

<div id="wallet" class="status">wallet: -</div>
<div id="gameover" class="status">GAMEOVER: -</div>

</div>

<script>

let tokenA = "USDC";
let tokenB = "GAMEOVER";

const GAMEOVER = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";

const ABI = [
 "function balanceOf(address) view returns(uint256)",
 "function decimals() view returns(uint8)"
];

function toggleTokens(){
  [tokenA, tokenB] = [tokenB, tokenA];
  document.getElementById("tokenA").innerText = tokenA;
  document.getElementById("tokenB").innerText = tokenB;
}

async function connectWallet(){
 if(!window.ethereum) return alert("Use MetaMask");

 const provider = new ethers.providers.Web3Provider(window.ethereum);
 const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
 const wallet = accounts[0];

 document.getElementById("wallet").innerText =
 wallet.slice(0,6)+"..."+wallet.slice(-4);

 const token = new ethers.Contract(GAMEOVER, ABI, provider);
 const raw = await token.balanceOf(wallet);
 const decimals = await token.decimals();

 document.getElementById("gameover").innerText =
 "GAMEOVER: "+(raw / (10**decimals)).toLocaleString();
}

function fakeSwap(){
 alert("Agora vamos ligar o swap real 😈");
}

</script>

</body>
</html>
