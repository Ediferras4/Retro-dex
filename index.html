<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro DEX</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: radial-gradient(circle, #220044, #000);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* container estilo arcade */
.arcade {
  width: 380px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(#111, #000);
  border: 3px solid #00fff7;
  box-shadow: 0 0 25px #00fff7, inset 0 0 20px #000;
  text-align: center;
}

/* título neon */
.title {
  font-size: 28px;
  color: #00fff7;
  text-shadow: 0 0 10px #00fff7, 0 0 20px #00fff7;
}

/* botão neon */
.btn {
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid #ff00cc;
  background: transparent;
  color: #ff00cc;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 0 10px #ff00cc;
}

/* painel central */
.panel {
  margin-top: 15px;
  padding: 15px;
  border-radius: 12px;
  border: 2px solid #ff00cc;
  background: rgba(255, 0, 200, 0.08);
}

/* inputs */
input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  border: 2px solid #00fff7;
  background: black;
  color: #00fff7;
  font-size: 16px;
}

/* botão start */
.start {
  margin-top: 15px;
  padding: 14px;
  border-radius: 10px;
  background: linear-gradient(90deg, #ff0000, #ff8800);
  color: white;
  font-size: 16px;
  font-weight: bold;
  border: none;
  box-shadow: 0 0 15px red;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="arcade">

<div class="title">🎮 RETRO DEX</div>

<button class="btn" onclick="connectWallet()">CONNECT WALLET</button>

<div id="walletStatus">Wallet não conectada</div>
<div id="balance">Saldo: -</div>
<div id="gameover">GAMEOVER: -</div>

<div class="panel">

<div>SEND</div>
<input id="send" placeholder="0.0 USDC">

<div>RECEIVE</div>
<input value="GAMEOVER" disabled>

</div>

<button class="start" onclick="fakeSwap()">PRESS START</button>

</div>

<script>
const GAMEOVER = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";

const ABI = [
 "function balanceOf(address) view returns(uint256)",
 "function decimals() view returns(uint8)"
];

async function connectWallet(){
 if(!window.ethereum) return alert("Use MetaMask");

 const provider = new ethers.providers.Web3Provider(window.ethereum);
 const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
 const wallet = accounts[0];

 document.getElementById("walletStatus").innerText =
 wallet.slice(0,6)+"..."+wallet.slice(-4);

 const balance = await provider.getBalance(wallet);
 document.getElementById("balance").innerText =
 "ETH: "+parseFloat(ethers.utils.formatEther(balance)).toFixed(4);

 const token = new ethers.Contract(GAMEOVER, ABI, provider);
 const raw = await token.balanceOf(wallet);
 const decimals = await token.decimals();

 document.getElementById("gameover").innerText =
 "GAMEOVER: "+(raw / (10**decimals)).toLocaleString();
}

function fakeSwap(){
 alert("Agora vamos ligar o swap real 😈");
}
</script>

</body>
</html>
