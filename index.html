<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro DEX</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-top: #06122c;
      --bg-mid: #0a234f;
      --bg-bottom: #121a35;

      --card-bg: rgba(10, 16, 34, 0.92);
      --box-bg: rgba(14, 22, 44, 0.96);
      --box-border: rgba(117, 146, 212, 0.18);

      --text-main: #f3f7ff;
      --text-soft: #b8c6e6;
      --text-dim: #86a0d3;

      --arc-blue: #2f6bff;
      --arc-blue-2: #4f86ff;
      --arc-indigo: #6e7dff;
      --arc-lilac: #9a8cff;
      --arc-cyan: #56c2ff;
      --arc-peach: #ff9b8f;

      --danger-1: #ff7b72;
      --danger-2: #ffb26b;

      --shadow-blue: rgba(47, 107, 255, 0.28);
      --shadow-soft: rgba(9, 18, 38, 0.55);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(130, 110, 255, 0.20) 0%, rgba(130, 110, 255, 0) 26%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 42%, var(--bg-bottom) 100%);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 430px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex: 1;
      margin-top: 0;
      margin-left: -2px;
    }

    .brand-line {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .brand-face {
      width: 86px;
      height: 86px;
      object-fit: contain;
      display: block;
      margin-right: -2px;
      margin-top: -8px;
      filter: drop-shadow(0 0 14px rgba(86, 160, 255, 0.28));
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 0.2px;
      margin-top: 2px;
    }

    .brand-retro {
      color: #eef4ff;
      text-shadow: 0 0 10px rgba(89, 183, 255, 0.08);
    }

    .brand-dex {
      color: #59b7ff;
      text-shadow: 0 0 12px rgba(89, 183, 255, 0.14);
    }

    .sub {
      font-size: 13px;
      color: var(--text-soft);
      margin-top: 2px;
    }

    .wallet-btn {
      border: 1px solid rgba(133, 196, 255, 0.20);
      border-radius: 16px;
      padding: 11px 15px;
      background: linear-gradient(135deg, #1f59f3 0%, #3d7cff 45%, #6aa8ff 100%);
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(47, 107, 255, 0.24);
      white-space: nowrap;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
      margin-top: 0;
    }

    .wallet-btn:hover {
      box-shadow: 0 12px 28px rgba(47, 107, 255, 0.32);
    }

    .wallet-btn:active {
      transform: scale(0.98);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(98, 127, 197, 0.14);
      border-radius: 28px;
      padding: 16px;
      box-shadow:
        0 20px 40px var(--shadow-soft),
        inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    .network-warning {
      display: none;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 123, 114, 0.10);
      border: 1px solid rgba(255, 123, 114, 0.28);
      color: #ffd8d3;
      font-size: 14px;
    }

    .switch-network-btn {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--danger-1), var(--danger-2));
      color: #fff;
      font-weight: 700;
      cursor: pointer;
