<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEX - Swap</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(to bottom, #f3e8ff, #e0bbff);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .glass {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(12px);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md mx-auto">

    <!-- Top Bar -->
    <div class="glass rounded-3xl p-2 mb-4 flex items-center shadow-lg">
      <div class="w-10 h-10 bg-gradient-to-br from-purple-400 to-indigo-400 rounded-2xl flex items-center justify-center text-white text-2xl">
        🙂
      </div>
      <div class="flex-1 mx-3">
        <div class="h-10 bg-white/60 rounded-3xl"></div>
      </div>
      <button class="bg-purple-600 text-white px-5 py-2 rounded-3xl flex items-center gap-2 font-medium">
        <span>👤</span>
        CONECTE
      </button>
    </div>

    <!-- Tabs -->
    <div class="glass rounded-3xl p-1 mb-6 flex text-sm font-medium">
      <button class="flex-1 py-3 flex items-center justify-center gap-2 text-purple-700 bg-white/70 rounded-3xl">
        ↔️ SWP
      </button>
      <button class="flex-1 py-3 flex items-center justify-center gap-2 text-purple-700">
        💳 PAY
      </button>
      <button class="flex-1 py-3 flex items-center justify-center gap-2 text-purple-700">
        📋 MENU
      </button>
    </div>

    <!-- Swap Card -->
    <div class="glass rounded-3xl p-6 shadow-xl">

      <!-- From -->
      <div class="bg-white/80 rounded-2xl p-4 mb-3">
        <div class="flex justify-between items-center">
          <span class="text-5xl font-semibold text-gray-800">12</span>
          <div class="bg-purple-100 text-purple-700 px-4 py-2 rounded-3xl flex items-center gap-2">
            USD <span class="text-xl">▼</span>
          </div>
        </div>
      </div>

      <!-- Swap Button -->
      <div class="flex justify-center -my-5 relative z-10">
        <button class="w-12 h-12 bg-white rounded-full flex items-center justify-center shadow-lg border-4 border-purple-100 hover:scale-110 transition">
          <span class="text-2xl">↔️</span>
        </button>
      </div>

      <!-- To -->
      <div class="bg-white/80 rounded-2xl p-4 mt-3">
        <div class="flex justify-between items-center">
          <span class="text-5xl font-semibold text-gray-800">12</span>
          <div class="bg-purple-100 text-purple-700 px-4 py-2 rounded-3xl flex items-center gap-2">
            USD <span class="text-xl">▼</span>
          </div>
        </div>
      </div>

      <!-- Connect Wallet -->
      <div class="mt-8 bg-gradient-to-br from-purple-100 to-purple-200 rounded-3xl p-6 text-center">
        <div class="flex justify-center mb-3">
          <div class="w-10 h-10 bg-white/70 rounded-2xl flex items-center justify-center text-2xl">👤</div>
        </div>
        <p class="text-purple-800 font-medium">
          CONECTE sua carteira<br>
          <span class="text-purple-600/80 text-sm">para transferir entre cadeias</span>
        </p>

        <button onclick="alert('Carteira conectada! (simulação)')" 
                class="mt-6 w-full bg-gradient-to-r from-purple-500 to-violet-600 text-white py-4 rounded-3xl font-semibold flex items-center justify-center gap-3 shadow-md hover:brightness-105 transition">
          <span class="text-xl">💼</span>
          Conecte
        </button>
      </div>

    </div>

    <!-- Social Icons -->
    <div class="flex justify-center gap-6 mt-10">
      <div class="w-12 h-12 bg-white/70 rounded-2xl flex items-center justify-center shadow text-2xl hover:scale-110 transition">
        🐙
      </div>
      <div class="w-12 h-12 bg-white/70 rounded-2xl flex items-center justify-center shadow text-2xl hover:scale-110 transition">
        𝕏
      </div>
      <div class="w-12 h-12 bg-white/70 rounded-2xl flex items-center justify-center shadow text-2xl hover:scale-110 transition">
        🟣
      </div>
    </div>

  </div>

</body>
</html>
