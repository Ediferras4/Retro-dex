<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro DEX</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: radial-gradient(circle, #1a0033, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.dex {
  width: 400px;
  background: #111;
  padding: 20px;
  border-radius: 20px;
  box-shadow: 0 0 30px #00fff7;
}

.title {
  text-align: center;
  font-size: 22px;
  margin-bottom: 15px;
}

.box {
  background: #000;
  padding: 15px;
  border-radius: 15px;
  margin-top: 10px;
}

.label {
  font-size: 12px;
  color: #aaa;
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.input {
  border: none;
  background: transparent;
  color: white;
  font-size: 20px;
  outline: none;
  width: 100%;
}

.token {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #222;
  padding: 6px 10px;
  border-radius: 10px;
}

.icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
}

.switch {
  text-align: center;
  margin: 10px;
  cursor: pointer;
}

.btn {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(90deg, #ff00cc, #00fff7);
  font-weight: bold;
  cursor: pointer;
}

.status {
  text-align: center;
  margin-top: 10px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="dex">

<div class="title">🎮 Retro DEX</div>

<!-- SEND -->
<div class="box">
  <div class="label">SEND</div>
  <div class="row">
    <input id="amount" class="input" placeholder="0.0" oninput="preview()">
    <div class="token" id="tokenA">
      <img id="iconA" class="icon" src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png">
      <span id="labelA">USDC</span>
    </div>
  </div>
</div>

<!-- SWITCH -->
<div class="switch" onclick="invert()">⇅</div>

<!-- RECEIVE -->
<div class="box">
  <div class="label">RECEIVE</div>
  <div class="row">
    <input id="output" class="input" disabled>
    <div class="token" id="tokenB">
      <img id="iconB" class="icon" src="LINK_DA_SUA_IMAGEM">
      <span id="labelB">GAMEOVER</span>
    </div>
  </div>
</div>

<button class="btn" onclick="connectWallet()">CONNECT WALLET</button>
<button class="btn" onclick="swap()">SWAP</button>

<div id="status" class="status">-</div>

</div>

<script>

const USDC = "0x3600000000000000000000000000000000000000";
const GAMEOVER = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";
const PAIR = "0x3e0f14368f385CE4c5c5d4B816Ec8c8c475c63F0";

const ERC20 = [
 "function approve(address spender,uint amount) returns(bool)",
 "function balanceOf(address) view returns(uint)",
 "function decimals() view returns(uint8)"
];

const PAIR_ABI = [
 "function swap(address tokenIn,uint amountIn)",
 "function getAmountOut(address tokenIn,uint amountIn) view returns(uint)"
];

let tokenIn = USDC;

async function connectWallet(){
 const provider = new ethers.providers.Web3Provider(window.ethereum);
 await provider.send("eth_requestAccounts", []);
 document.getElementById("status").innerText = "Wallet conectada";
}

function invert(){
 if(tokenIn === USDC){
   tokenIn = GAMEOVER;
   document.getElementById("labelA").innerText = "GAMEOVER";
   document.getElementById("labelB").innerText = "USDC";

   document.getElementById("iconA").src = "LINK_DA_SUA_IMAGEM";
   document.getElementById("iconB").src = "https://cryptologos.cc/logos/usd-coin-usdc-logo.png";
 } else {
   tokenIn = USDC;
   document.getElementById("labelA").innerText = "USDC";
   document.getElementById("labelB").innerText = "GAMEOVER";

   document.getElementById("iconA").src = "https://cryptologos.cc/logos/usd-coin-usdc-logo.png";
   document.getElementById("iconB").src = "LINK_DA_SUA_IMAGEM";
 }
}

async function preview(){
 try{
 const provider = new ethers.providers.Web3Provider(window.ethereum);
 const pair = new ethers.Contract(PAIR, PAIR_ABI, provider);

 const amount = document.getElementById("amount").value;
 if(!amount) return;

 const decimals = tokenIn === USDC ? 6 : 18;

 const amountIn = ethers.utils.parseUnits(amount, decimals);
 const out = await pair.getAmountOut(tokenIn, amountIn);

 const decOut = tokenIn === USDC ? 18 : 6;

 document.getElementById("output").value =
 ethers.utils.formatUnits(out, decOut);

 }catch(e){}
}

async function swap(){
 try{
 const provider = new ethers.providers.Web3Provider(window.ethereum);
 const signer = provider.getSigner();

 const amount = document.getElementById("amount").value;

 const decimals = tokenIn === USDC ? 6 : 18;
 const amountIn = ethers.utils.parseUnits(amount, decimals);

 const token = new ethers.Contract(tokenIn, ERC20, signer);

 document.getElementById("status").innerText = "Aprovando...";

 const tx1 = await token.approve(PAIR, amountIn);
 await tx1.wait();

 document.getElementById("status").innerText = "Swapping...";

 const pair = new ethers.Contract(PAIR, PAIR_ABI, signer);
 const tx2 = await pair.swap(tokenIn, amountIn);
 await tx2.wait();

 document.getElementById("status").innerText = "Swap concluído 🚀";

 }catch(e){
 document.getElementById("status").innerText = "Erro no swap";
 console.log(e);
 }
}

</script>

</body>
</html>
