<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro DEX</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>

/* FUNDO COM ESTRELAS */
body {
  margin: 0;
  font-family: monospace;
  background: radial-gradient(circle, #2b0055, #000);
  overflow: hidden;
  color: white;
}

/* partículas */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image:
    radial-gradient(#fff 1px, transparent 1px),
    radial-gradient(#fff 1px, transparent 1px);
  background-size: 50px 50px;
  opacity: 0.1;
}

/* container principal */
.container {
  width: 380px;
  margin: auto;
  margin-top: 50px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(180deg, #111, #000);
  border: 3px solid #7df9ff;
  box-shadow: 0 0 30px #7df9ff;
}

/* topo */
.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* título */
.title {
  font-size: 22px;
  color: #ff66ff;
  text-shadow: 0 0 10px #ff66ff;
}

/* botão wallet */
.wallet-btn {
  border: 2px solid #ff66ff;
  padding: 8px 12px;
  border-radius: 10px;
  background: transparent;
  color: #ff66ff;
  box-shadow: 0 0 10px #ff66ff;
  cursor: pointer;
}

/* painel central */
.panel {
  margin-top: 20px;
  padding: 15px;
  border-radius: 15px;
  background: #000;
  border: 2px solid #7df9ff;
  box-shadow: inset 0 0 15px #7df9ff;
}

/* texto central */
.ready {
  text-align: center;
  color: orange;
  font-size: 18px;
  margin-bottom: 15px;
}

/* labels */
.label {
  color: #7df9ff;
  margin-top: 10px;
}

/* inputs */
.input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 2px solid #7df9ff;
  background: black;
  color: #7df9ff;
  font-size: 16px;
}

/* botão start */
.start {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: linear-gradient(90deg, red, orange);
  border: none;
  color: white;
  font-weight: bold;
  font-size: 16px;
  box-shadow: 0 0 20px red;
  cursor: pointer;
}

/* status */
.status {
  font-size: 12px;
  margin-top: 10px;
  color: #ccc;
}

</style>
</head>

<body>

<div class="container">

<div class="top">
<div class="title">RETRO DEX</div>
<button class="wallet-btn" onclick="connectWallet()">CONNECT</button>
</div>

<div class="panel">

<div class="ready">>> READY TO TRADE <<</div>

<div class="label">SEND</div>
<input id="send" class="input" placeholder="0.0 USDC">

<div class="label">RECEIVE</div>
<input class="input" value="GAMEOVER" disabled>

<button class="start" onclick="fakeSwap()">PRESS START</button>

<div id="wallet" class="status">wallet: -</div>
<div id="balance" class="status">saldo: -</div>
<div id="gameover" class="status">GAMEOVER: -</div>

</div>

</div>

<script>

const GAMEOVER = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";

const ABI = [
 "function balanceOf(address) view returns(uint256)",
 "function decimals() view returns(uint8)"
];

async function connectWallet(){
 if(!window.ethereum) return alert("Use MetaMask");

 const provider = new ethers.providers.Web3Provider(window.ethereum);
 const accounts = await window.ethereum.request({method:"eth_requestAccounts"});
 const wallet = accounts[0];

 document.getElementById("wallet").innerText =
 wallet.slice(0,6)+"..."+wallet.slice(-4);

 const balance = await provider.getBalance(wallet);
 document.getElementById("balance").innerText =
 "ETH: "+parseFloat(ethers.utils.formatEther(balance)).toFixed(4);

 const token = new ethers.Contract(GAMEOVER, ABI, provider);
 const raw = await token.balanceOf(wallet);
 const decimals = await token.decimals();

 document.getElementById("gameover").innerText =
 "GAMEOVER: "+(raw / (10**decimals)).toLocaleString();
}

function fakeSwap(){
 alert("Pronto pra ligar swap real 😈");
}

</script>

</body>
</html>
