<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro DEX</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-top: #06122c;
      --bg-mid: #0a234f;
      --bg-bottom: #121a35;
      --card-bg: rgba(10, 16, 34, 0.92);
      --box-bg: rgba(14, 22, 44, 0.96);
      --text-main: #f3f7ff;
      --text-soft: #b8c6e6;
      --text-dim: #86a0d3;
      --shadow-soft: rgba(9, 18, 38, 0.55);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(130, 110, 255, 0.20) 0%, rgba(130, 110, 255, 0) 26%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 42%, var(--bg-bottom) 100%);
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 430px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .brand-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      flex: 1;
      margin-left: -2px;
    }

    .brand-line {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .brand-face {
      width: 86px;
      height: 86px;
      object-fit: contain;
      display: block;
      margin-right: -3px;
      margin-top: -10px;
      filter: drop-shadow(0 0 14px rgba(86, 160, 255, 0.28));
    }

    .brand {
      font-size: 24px;
      font-weight: 800;
      line-height: 0.95;
      letter-spacing: 0.2px;
    }

    .brand-retro {
      color: #eef4ff;
    }

    .brand-dex {
      color: #59b7ff;
    }

    .sub {
      font-size: 13px;
      color: var(--text-soft);
      margin-top: 0;
    }

    .wallet-btn {
      border: 1px solid rgba(116, 186, 255, 0.16);
      border-radius: 15px;
      padding: 10px 14px;
      background: linear-gradient(135deg, #1d56f2 0%, #3a78ff 52%, #63a8ff 100%);
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(47, 107, 255, 0.22);
      white-space: nowrap;
      margin-top: 2px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .wallet-btn:active {
      transform: scale(0.98);
    }

    .wallet-btn:hover {
      box-shadow: 0 12px 26px rgba(47, 107, 255, 0.28);
    }

    .card {
      background: var(--card-bg);
      border: 1px solid rgba(98, 127, 197, 0.14);
      border-radius: 28px;
      padding: 16px;
      box-shadow:
        0 20px 40px var(--shadow-soft),
        inset 0 1px 0 rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
    }

    .network-warning {
      display: none;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(239, 68, 68, 0.28);
      color: #ffd1d1;
      font-size: 14px;
    }

    .switch-network-btn {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      background: linear-gradient(135deg, #ff7b72, #ffb26b);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .swap-box {
      background: var(--box-bg);
      border: 1px solid rgba(117, 146, 212, 0.18);
      border-radius: 22px;
      padding: 15px;
      margin-bottom: 10px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
    }

    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .row-top-pay {
      align-items: center;
      justify-content: space-between;
      min-height: 28px;
    }

    .amount-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }

    .amount-side {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-top: 8px;
    }

    .token-side {
      min-width: 152px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .amount-input {
      width: 100%;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-size: 34px;
      font-weight: 700;
      padding: 0;
      margin: 0;
    }

    .amount-input::placeholder {
      color: #7385af;
    }

    .quick-amounts {
      display: none;
      gap: 4px;
      flex-wrap: nowrap;
      align-items: center;
      margin-top: -1px;
    }

    .quick-amounts.show {
      display: flex;
    }

    .quick-btn {
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: #f3f7ff;
      border-radius: 999px;
      padding: 3px 8px;
      height: 26px;
      min-width: 0;
      cursor: pointer;
      font-size: 10px;
      font-weight: 700;
      line-height: 1;
      box-shadow: none;
      transition: background 0.15s ease, transform 0.15s ease, border-color 0.15s ease;
    }

    .quick-btn:hover {
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(255, 255, 255, 0.14);
    }

    .quick-btn:active {
      transform: scale(0.97);
    }

    .token-pill {
      border: 1px solid rgba(112, 140, 210, 0.14);
      border-radius: 999px;
      background: rgba(27, 39, 76, 0.95);
      color: var(--text-main);
      padding: 11px 16px;
      font-size: 14px;
      font-weight: 700;
      min-width: 152px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      cursor: pointer;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .token-pill:hover {
      border-color: rgba(140, 170, 230, 0.24);
    }

    .token-pill:active {
      transform: scale(0.985);
    }

    .token-icon {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 0 12px rgba(79, 134, 255, 0.18);
    }

    .balance-under-token {
      width: 100%;
      text-align: right;
      display: block;
      padding-right: 6px;
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.2;
    }

    .switch-wrap {
      display: flex;
      justify-content: center;
      margin: -4px 0 6px;
      position: relative;
      z-index: 2;
    }

    .switch-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid #0c1530;
      background: linear-gradient(180deg, #162856, #101d40);
      color: #f2f6ff;
      font-size: 20px;
      cursor: pointer;
      box-shadow:
        0 8px 18px rgba(0,0,0,0.28),
        0 0 18px rgba(79, 134, 255, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .switch-btn:hover {
      box-shadow:
        0 10px 20px rgba(0,0,0,0.32),
        0 0 20px rgba(79, 134, 255, 0.24);
    }

    .switch-btn:active {
      transform: scale(0.97);
    }

    .details {
      margin-top: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.025);
      padding: 12px;
      font-size: 13px;
      color: var(--text-soft);
      border: 1px solid rgba(117, 146, 212, 0.08);
    }

    .details-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 7px 0;
    }

    .slippage-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .slippage-btn {
      border: 1px solid rgba(119, 170, 255, 0.16);
      background: linear-gradient(180deg, rgba(25, 38, 76, 0.98), rgba(18, 29, 58, 0.98));
      color: #e6eeff;
      border-radius: 999px;
      padding: 9px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      transition: all 0.15s ease;
    }

    .slippage-btn.active {
      background: linear-gradient(135deg, #245fff 0%, #4f86ff 55%, #7fa0ff 100%);
      border-color: transparent;
      color: #ffffff;
      box-shadow: 0 0 16px rgba(79, 134, 255, 0.24);
    }

    .main-btn {
      width: 100%;
      margin-top: 14px;
      border: 1px solid rgba(116, 186, 255, 0.16);
      border-radius: 18px;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #f7fbff;
      background: linear-gradient(135deg, #123fd5 0%, #1f59f3 36%, #3f87ff 72%, #6ba8ff 100%);
      box-shadow: 0 14px 30px rgba(29, 86, 242, 0.24);
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .main-btn:hover {
      box-shadow: 0 16px 34px rgba(29, 86, 242, 0.30);
    }

    .main-btn:active {
      transform: scale(0.99);
    }

    .main-btn:disabled {
      opacity: 0.68;
      cursor: not-allowed;
      box-shadow: none;
    }

    .status {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: var(--text-soft);
      min-height: 18px;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }

    .mini {
      font-size: 12px;
      color: var(--text-dim);
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="brand-wrap">
        <div class="brand-line">
          <img src="./retro-face.png" alt="Retro DEX" class="brand-face" />
          <div class="brand"><span class="brand-retro">Retro</span> <span class="brand-dex">DEX</span></div>
        </div>
        <div class="sub">USDC ⇄ GAMEOVER · Arc Testnet</div>
      </div>
      <button class="wallet-btn" onclick="handleWalletButton()" id="walletBtn">
        Connect Wallet
      </button>
    </div>

    <div class="card">
      <div class="network-warning" id="networkWarning">
        Você está na rede errada.
        <button class="switch-network-btn" onclick="switchToArc()">
          Switch to Arc Testnet
        </button>
      </div>

      <div class="swap-box">
        <div class="row-top row-top-pay">
          <span>You pay</span>

          <div class="quick-amounts" id="quickAmounts">
            <button class="quick-btn" type="button" onclick="setPercentageAmount(25)">25%</button>
            <button class="quick-btn" type="button" onclick="setPercentageAmount(50)">50%</button>
            <button class="quick-btn" type="button" onclick="setPercentageAmount(75)">75%</button>
            <button class="quick-btn" type="button" onclick="setPercentageAmount(100)">Máx.</button>
          </div>
        </div>

        <div class="amount-row">
          <div class="amount-side">
            <input
              id="amountIn"
              class="amount-input"
              type="number"
              inputmode="decimal"
              placeholder="0.0"
              oninput="handleAmountInput()"
              onfocus="updateQuickAmountsVisibility()"
              onblur="handleAmountBlur()"
            />
          </div>

          <div class="token-side">
            <button class="token-pill" id="tokenInBtn" onclick="toggleDirection()">
              <img id="tokenInIcon" class="token-icon" src="./Usdc.png" alt="USDC" />
              <span id="tokenInText">USDC</span>
            </button>
            <span class="balance-under-token mini" id="balanceIn">Balance: -</span>
          </div>
        </div>
      </div>

      <div class="switch-wrap">
        <button class="switch-btn" onclick="toggleDirection()">⇅</button>
      </div>

      <div class="swap-box">
        <div class="row-top">
          <span>You receive</span>
          <span class="mini" id="balanceOut">Balance: -</span>
        </div>

        <div class="amount-row">
          <input
            id="amountOut"
            class="amount-input"
            type="text"
            placeholder="0.0"
            disabled
          />
          <button class="token-pill" id="tokenOutBtn" onclick="toggleDirection()">
            <img id="tokenOutIcon" class="token-icon" src="./gameover.png" alt="GAMEOVER" />
            <span id="tokenOutText">GAMEOVER</span>
          </button>
        </div>
      </div>

      <div class="details">
        <div class="details-row">
          <span>Wallet</span>
          <span id="walletStatus">-</span>
        </div>
        <div class="details-row">
          <span>Network</span>
          <span id="networkStatus">-</span>
        </div>
        <div class="details-row">
          <span>Price</span>
          <span id="priceStatus">-</span>
        </div>
        <div class="details-row">
          <span>Slippage</span>
          <span id="slippageStatus">1%</span>
        </div>
        <div class="details-row">
          <span>Minimum received</span>
          <span id="minReceivedStatus">-</span>
        </div>

        <div class="slippage-row">
          <button class="slippage-btn active" onclick="setSlippage(1)" id="slippage1">1%</button>
          <button class="slippage-btn" onclick="setSlippage(0.5)" id="slippage05">0.5%</button>
          <button class="slippage-btn" onclick="setSlippage(2)" id="slippage2">2%</button>
        </div>
      </div>

      <button class="main-btn" id="swapBtn" onclick="executeSwap()" disabled>
        Enter amount
      </button>

      <div class="status" id="statusText"></div>
    </div>

    <div class="footer">retro-dex-two.vercel.app</div>
  </div>

  <script>
    const ARC_CHAIN_ID = 5042002;
    const ARC_CHAIN_ID_HEX = "0x4cef52";
    const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
    const GAMEOVER_ADDRESS = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";
    const PAIR_ADDRESS = "0xF55Abd9674b7faEF659cA7b01467324CFb731D6d";

    const USDC_ICON = "./Usdc.png";
    const GAMEOVER_ICON = "./gameover.png";

    const ERC20_ABI = [
      "function approve(address spender, uint256 amount) returns (bool)",
      "function allowance(address owner, address spender) view returns (uint256)",
      "function balanceOf(address owner) view returns (uint256)",
      "function decimals() view returns (uint8)",
      "function symbol() view returns (string)"
    ];

    const PAIR_ABI = [
      "function swap(address tokenIn, uint256 amountIn) public",
      "function getAmountOut(address tokenIn, uint256 amountIn) view returns (uint256)",
      "function token0() view returns (address)",
      "function token1() view returns (address)",
      "function reserve0() view returns (uint256)",
      "function reserve1() view returns (uint256)"
    ];

    let provider;
    let signer;
    let userAddress = null;
    let direction = "USDC_TO_GAMEOVER";
    let slippagePercent = 1;

    function getTokenInAddress() {
      return direction === "USDC_TO_GAMEOVER" ? USDC_ADDRESS : GAMEOVER_ADDRESS;
    }

    function getTokenOutAddress() {
      return direction === "USDC_TO_GAMEOVER" ? GAMEOVER_ADDRESS : USDC_ADDRESS;
    }

    function getTokenInLabel() {
      return direction === "USDC_TO_GAMEOVER" ? "USDC" : "GAMEOVER";
    }

    function getTokenOutLabel() {
      return direction === "USDC_TO_GAMEOVER" ? "GAMEOVER" : "USDC";
    }

    function getTokenInIcon() {
      return direction === "USDC_TO_GAMEOVER" ? USDC_ICON : GAMEOVER_ICON;
    }

    function getTokenOutIcon() {
      return direction === "USDC_TO_GAMEOVER" ? GAMEOVER_ICON : USDC_ICON;
    }

    async function getTokenDecimals(tokenAddress) {
      const token = new ethers.Contract(tokenAddress, ERC20_ABI, provider);
      return await token.decimals();
    }

    function setStatus(text) {
      document.getElementById("statusText").innerText = text || "";
    }

    function shortAddress(addr) {
      return addr ? addr.slice(0, 6) + "..." + addr.slice(-4) : "-";
    }

    function formatPlainNumber(value, maxDecimals = 6) {
      const num = Number(value);

      if (!Number.isFinite(num)) return "";
      if (num === 0) return "0";

      let decimals = maxDecimals;

      if (Math.abs(num) < 1) {
        decimals = Math.max(maxDecimals, 8);
      } else if (Math.abs(num) >= 1000) {
        decimals = Math.min(maxDecimals, 4);
      }

      return num.toFixed(decimals).replace(/\.?0+$/, "");
    }

    function updateWalletButton() {
      const btn = document.getElementById("walletBtn");
      btn.innerText = userAddress ? "Disconnect" : "Connect Wallet";
    }

    function updateQuickAmountsVisibility() {
      const input = document.getElementById("amountIn");
      const quick = document.getElementById("quickAmounts");
      const hasFocus = document.activeElement === input;
      const hasValue = input.value && Number(input.value) > 0;

      if (hasFocus || hasValue) {
        quick.classList.add("show");
      } else {
        quick.classList.remove("show");
      }
    }

    function handleAmountBlur() {
      setTimeout(() => {
        updateQuickAmountsVisibility();
      }, 120);
    }

    async function getTokenInBalance() {
      if (!provider || !userAddress) return null;

      const tokenIn = new ethers.Contract(getTokenInAddress(), ERC20_ABI, provider);
      const [balInRaw, decIn] = await Promise.all([
        tokenIn.balanceOf(userAddress),
        tokenIn.decimals()
      ]);

      return {
        raw: balInRaw,
        decimals: decIn,
        formatted: ethers.utils.formatUnits(balInRaw, decIn)
      };
    }

    async function setPercentageAmount(percent) {
      if (!provider || !userAddress) {
        setStatus("Conecte a wallet primeiro.");
        return;
      }

      try {
        const balanceData = await getTokenInBalance();
        if (!balanceData) return;

        const balanceNum = Number(balanceData.formatted);
        if (!balanceNum || balanceNum <= 0) {
          document.getElementById("amountIn").value = "";
          await handleAmountInput();
          return;
        }

        const selectedAmount = (balanceNum * percent) / 100;
        document.getElementById("amountIn").value = formatPlainNumber(selectedAmount, 8);
        await handleAmountInput();
        document.getElementById("amountIn").focus();
      } catch (err) {
        console.error(err);
        setStatus("Não foi possível preencher a porcentagem.");
      }
    }

    function clearWalletUI() {
      userAddress = null;
      signer = null;
      provider = null;
      document.getElementById("walletStatus").innerText = "-";
      document.getElementById("walletBtn").innerText = "Connect Wallet";
      document.getElementById("balanceIn").innerText = "Balance: -";
      document.getElementById("balanceOut").innerText = "Balance: -";
      document.getElementById("amountIn").value = "";
      document.getElementById("amountOut").value = "";
      document.getElementById("priceStatus").innerText = "-";
      document.getElementById("minReceivedStatus").innerText = "-";
      document.getElementById("networkStatus").innerText = "-";
      document.getElementById("networkWarning").style.display = "none";
      updateQuickAmountsVisibility();
      updateSwapButton();
      setStatus("Wallet desconectada.");
    }

    async function handleWalletButton() {
      if (userAddress) {
        clearWalletUI();
        return;
      }
      await connectWallet();
    }

    function updateDirectionUI() {
      document.getElementById("tokenInText").innerText = getTokenInLabel();
      document.getElementById("tokenOutText").innerText = getTokenOutLabel();
      document.getElementById("tokenInIcon").src = getTokenInIcon();
      document.getElementById("tokenOutIcon").src = getTokenOutIcon();
      document.getElementById("amountOut").value = "";
      document.getElementById("priceStatus").innerText = "-";
      document.getElementById("minReceivedStatus").innerText = "-";
      updateQuickAmountsVisibility();
      updateSwapButton();

      if (userAddress) {
        refreshBalances();
      }
    }

    function updateSwapButton() {
      const amount = document.getElementById("amountIn").value;
      const btn = document.getElementById("swapBtn");

      if (!userAddress) {
        btn.disabled = true;
        btn.innerText = "Connect Wallet";
        return;
      }

      if (!amount || Number(amount) <= 0) {
        btn.disabled = true;
        btn.innerText = "Enter amount";
        return;
      }

      btn.disabled = false;
      btn.innerText = `Swap ${getTokenInLabel()} for ${getTokenOutLabel()}`;
    }

    function setSlippage(value) {
      slippagePercent = value;
      document.getElementById("slippageStatus").innerText = `${value}%`;

      document.querySelectorAll(".slippage-btn").forEach((btn) => {
        btn.classList.remove("active");
      });

      if (value === 1) document.getElementById("slippage1").classList.add("active");
      if (value === 0.5) document.getElementById("slippage05").classList.add("active");
      if (value === 2) document.getElementById("slippage2").classList.add("active");

      handleAmountInput();
    }

    async function switchToArc() {
      if (!window.ethereum) {
        alert("Abra no navegador da MetaMask.");
        return;
      }

      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: ARC_CHAIN_ID_HEX }]
        });
      } catch (switchError) {
        if (switchError.code === 4902) {
          try {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId: ARC_CHAIN_ID_HEX,
                chainName: "Arc Testnet",
                nativeCurrency: {
                  name: "USDC",
                  symbol: "USDC",
                  decimals: 18
                },
                rpcUrls: ["https://rpc.testnet.arc.network"],
                blockExplorerUrls: ["https://testnet.arcscan.app"]
              }]
            });
          } catch (addError) {
            console.error(addError);
            setStatus("Não foi possível adicionar a Arc Testnet.");
          }
        } else {
          console.error(switchError);
          setStatus("Não foi possível trocar para a Arc Testnet.");
        }
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert("Abra no navegador da MetaMask.");
        return;
      }

      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        const network = await provider.getNetwork();
        document.getElementById("networkStatus").innerText =
          Number(network.chainId) === ARC_CHAIN_ID
            ? "Arc Testnet"
            : `${network.name || "Unknown"} (${network.chainId})`;

        document.getElementById("walletStatus").innerText = shortAddress(userAddress);
        updateWalletButton();

        const isArc = Number(network.chainId) === ARC_CHAIN_ID;
        document.getElementById("networkWarning").style.display = isArc ? "none" : "block";

        await refreshBalances();
        updateSwapButton();
        await handleAmountInput();
        setStatus("Wallet conectada.");
      } catch (err) {
        console.error(err);
        setStatus("Erro ao conectar wallet.");
      }
    }

    async function refreshBalances() {
      if (!provider || !userAddress) return;

      try {
        const tokenIn = new ethers.Contract(getTokenInAddress(), ERC20_ABI, provider);
        const tokenOut = new ethers.Contract(getTokenOutAddress(), ERC20_ABI, provider);

        const [balInRaw, balOutRaw, decIn, decOut] = await Promise.all([
          tokenIn.balanceOf(userAddress),
          tokenOut.balanceOf(userAddress),
          tokenIn.decimals(),
          tokenOut.decimals()
        ]);

        const balIn = Number(ethers.utils.formatUnits(balInRaw, decIn));
        const balOut = Number(ethers.utils.formatUnits(balOutRaw, decOut));

        document.getElementById("balanceIn").innerText =
          `Balance: ${balIn.toLocaleString("pt-BR", { maximumFractionDigits: 4 })} ${getTokenInLabel()}`;

        document.getElementById("balanceOut").innerText =
          `Balance: ${balOut.toLocaleString("pt-BR", { maximumFractionDigits: 4 })} ${getTokenOutLabel()}`;

        updateQuickAmountsVisibility();
      } catch (err) {
        console.error(err);
        setStatus("Erro ao ler saldos.");
      }
    }

    function toggleDirection() {
      direction = direction === "USDC_TO_GAMEOVER"
        ? "GAMEOVER_TO_USDC"
        : "USDC_TO_GAMEOVER";

      updateDirectionUI();
      handleAmountInput();
    }

    async function handleAmountInput() {
      updateSwapButton();
      updateQuickAmountsVisibility();

      const amountText = document.getElementById("amountIn").value;
      const output = document.getElementById("amountOut");

      if (!amountText || Number(amountText) <= 0 || !provider) {
        output.value = "";
        document.getElementById("priceStatus").innerText = "-";
        document.getElementById("minReceivedStatus").innerText = "-";
        setStatus("");
        return;
      }

      try {
        const pair = new ethers.Contract(PAIR_ADDRESS, PAIR_ABI, provider);
        const tokenInAddress = getTokenInAddress();
        const decIn = await getTokenDecimals(tokenInAddress);

        const amountIn = ethers.utils.parseUnits(amountText, decIn);
        const amountOutRaw = await pair.getAmountOut(tokenInAddress, amountIn);

        const decOut = await getTokenDecimals(getTokenOutAddress());
        const amountOut = ethers.utils.formatUnits(amountOutRaw, decOut);
        const amountOutNum = Number(amountOut);
        const amountInNum = Number(amountText);

        output.value = formatPlainNumber(amountOutNum, 8);

        if (amountInNum > 0 && amountOutNum > 0) {
          const price = amountOutNum / amountInNum;
          const minReceived = amountOutNum * (1 - slippagePercent / 100);

          document.getElementById("priceStatus").innerText =
            `1 ${getTokenInLabel()} = ${formatPlainNumber(price, 8)} ${getTokenOutLabel()}`;

          document.getElementById("minReceivedStatus").innerText =
            `${formatPlainNumber(minReceived, 8)} ${getTokenOutLabel()}`;

          setStatus("");
        }
      } catch (err) {
        console.error(err);
        output.value = "";
        document.getElementById("priceStatus").innerText = "-";
        document.getElementById("minReceivedStatus").innerText = "-";
        setStatus("Não foi possível calcular o valor de saída.");
      }
    }

    async function executeSwap() {
      if (!window.ethereum) {
        alert("Abra no navegador da MetaMask.");
        return;
      }

      if (!userAddress) {
        await connectWallet();
        return;
      }

      try {
        const network = await provider.getNetwork();
        if (Number(network.chainId) !== ARC_CHAIN_ID) {
          alert("Troque para a Arc Testnet.");
          return;
        }

        const amountText = document.getElementById("amountIn").value;
        if (!amountText || Number(amountText) <= 0) {
          alert("Digite um valor.");
          return;
        }

        const tokenInAddress = getTokenInAddress();
        const decIn = await getTokenDecimals(tokenInAddress);
        const amountIn = ethers.utils.parseUnits(amountText, decIn);

        const tokenIn = new ethers.Contract(tokenInAddress, ERC20_ABI, signer);
        const pair = new ethers.Contract(PAIR_ADDRESS, PAIR_ABI, signer);

        setStatus(`Aprovando ${getTokenInLabel()}...`);
        const approveTx = await tokenIn.approve(PAIR_ADDRESS, amountIn);
        await approveTx.wait();

        setStatus(`Fazendo swap ${getTokenInLabel()} → ${getTokenOutLabel()}...`);
        const swapTx = await pair.swap(tokenInAddress, amountIn);
        await swapTx.wait();

        setStatus("Swap concluído com sucesso 🚀");
        document.getElementById("amountIn").value = "";
        document.getElementById("amountOut").value = "";
        document.getElementById("priceStatus").innerText = "-";
        document.getElementById("minReceivedStatus").innerText = "-";
        updateQuickAmountsVisibility();
        await refreshBalances();
        updateSwapButton();
      } catch (err) {
        console.error(err);
        setStatus("Erro no swap. Veja o console ou tente de novo.");
        alert("Erro no swap.");
      }
    }

    if (window.ethereum) {
      window.ethereum.on("accountsChanged", async (accounts) => {
        if (!accounts.length) {
          clearWalletUI();
          return;
        }

        userAddress = accounts[0];
        signer = provider ? provider.getSigner() : null;
        document.getElementById("walletStatus").innerText = shortAddress(userAddress);
        updateWalletButton();
        await refreshBalances();
        await handleAmountInput();
      });

      window.ethereum.on("chainChanged", () => {
        window.location.reload();
      });
    }

    updateDirectionUI();
    updateWalletButton();
    updateQuickAmountsVisibility();
  </script>
</body>
</html>
