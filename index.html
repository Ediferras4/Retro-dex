<script>
  // 🔥 FINALIZAÇÃO E AJUSTES FINAIS DO GENESIS

  // 👉 BOTÃO INTELIGENTE (SWAP & PAY / CONNECT WALLET)
  function updateSmartButtons() {
    const swapBtn = document.getElementById("swapBtn");
    const payBtn = document.getElementById("payBtn");

    if (!isWalletConnected) {
      if (swapBtn) swapBtn.innerText = "Connect Wallet";
      if (payBtn) payBtn.innerText = "Connect Wallet";
      return;
    }

    if (swapBtn) swapBtn.innerText = "Swap";
    if (payBtn) payBtn.innerText = "Swap & Pay";
  }

  // 👉 CLICK INTELIGENTE
  function handleSmartButton(action) {
    if (!isWalletConnected) {
      openWalletSheet();
      return;
    }

    if (action === "swap") {
      executeSwap();
    }

    if (action === "pay") {
      handlePayClick();
    }
  }

  // 👉 INPUT LISTENERS (ATUALIZA UI EM TEMPO REAL)
  const payInputs = ["payRecipient", "payUsdcAmount", "payNote"];

  payInputs.forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener("input", () => {
        updatePaymentUI();
        updateSmartButtons();
      });
    }
  });

  // 👉 ESCONDER SUMMARY AO INICIAR
  window.addEventListener("load", () => {
    const summary = document.getElementById("paymentSummary");
    if (summary) summary.style.display = "none";

    updateSmartButtons();
  });

  // 👉 LIMPAR APÓS TRANSAÇÃO (SIMULAÇÃO)
  async function simulateSuccess() {
    document.getElementById("paymentStatusText").innerText =
      "Transaction confirmed ✅";

    setTimeout(() => {
      clearPaymentAfterSuccess();
      document.getElementById("paymentStatusText").innerText = "";
    }, 1200);
  }

  // 👉 SUBSTITUI EXECUÇÃO REAL (FASE 1 TESTE)
  async function executeSwap() {
    document.getElementById("statusText").innerText =
      "Confirm in wallet...";

    setTimeout(() => {
      document.getElementById("statusText").innerText =
        "Swap completed 🚀";
    }, 1200);
  }

  // 👉 BOTÃO PAY FINAL
  function handlePayClick() {
    if (!isWalletConnected) {
      openWalletSheet();
      return;
    }

    document.getElementById("paymentStatusText").innerText =
      "Confirm in wallet...";

    setTimeout(() => {
      simulateSuccess();
    }, 1200);
  }

  // 👉 SEGURANÇA INPUT (NÚMEROS)
  const amountInput = document.getElementById("payUsdcAmount");
  if (amountInput) {
    amountInput.addEventListener("input", () => {
      amountInput.value = amountInput.value.replace(",", ".").replace(/[^\d.]/g, "");
    });
  }

  // 👉 MELHORIA UX: FECHAR SHEETS AO CLICAR FORA
  document.addEventListener("click", (e) => {
    const wallet = document.getElementById("walletSheet");
    const slip = document.getElementById("slippageSheet");
    const gear = document.getElementById("gearSheet");

    if (!e.target.closest(".wallet-sheet") && !e.target.closest(".wallet-btn")) {
      if (wallet) wallet.classList.remove("open");
    }

    if (!e.target.closest(".slippage-sheet") && !e.target.closest(".slippage-open-btn")) {
      if (slip) slip.classList.remove("open");
    }

    if (!e.target.closest(".gear-sheet") && !e.target.closest(".gear-btn")) {
      if (gear) gear.classList.remove("open");
    }
  });

  // 👉 FINAL INIT
  updateSmartButtons();
</script>
