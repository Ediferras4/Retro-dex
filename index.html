<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro DEX</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, #2a003f 0%, #12001f 35%, #000000 75%);
      color: #00ffd5;
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 390px;
      background: rgba(0, 0, 0, 0.92);
      border: 3px solid #00ffd5;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 0 18px #00ffd5;
    }

    .title {
      text-align: center;
      font-size: 28px;
      margin-bottom: 8px;
      text-shadow: 0 0 10px #00ffd5;
    }

    .subtitle {
      text-align: center;
      color: #ff4fd8;
      margin-bottom: 20px;
      font-size: 13px;
    }

    .status-box {
      border: 2px solid #ff4fd8;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 18px;
      background: rgba(255, 79, 216, 0.08);
    }

    .status-line {
      font-size: 14px;
      margin: 6px 0;
      word-break: break-all;
    }

    .label {
      display: block;
      margin: 14px 0 6px;
      color: #ffd54a;
      font-size: 14px;
    }

    .input-box {
      width: 100%;
      padding: 12px;
      border: 2px solid #00ffd5;
      border-radius: 10px;
      background: #050505;
      color: #00ffd5;
      font-size: 16px;
      outline: none;
      font-family: monospace;
    }

    .input-box:disabled {
      color: #8fffee;
      opacity: 0.95;
    }

    .btn {
      width: 100%;
      padding: 13px;
      border: 2px solid #00ffd5;
      border-radius: 12px;
      background: #000;
      color: #00ffd5;
      font-size: 16px;
      font-family: monospace;
      margin-top: 14px;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(0, 255, 213, 0.35);
    }

    .main-btn {
      border-color: #ffd54a;
      color: #ffd54a;
      box-shadow: 0 0 12px rgba(255, 213, 74, 0.4);
      font-weight: bold;
    }

    .footer {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">🎮 RETRO DEX</div>
    <div class="subtitle">Arcade Swap Testnet</div>

    <div class="status-box">
      <div id="walletStatus" class="status-line">Wallet não conectada</div>
      <div id="networkStatus" class="status-line">Rede: -</div>
      <div id="balance" class="status-line">Saldo da rede: -</div>
      <div id="gameoverBalance" class="status-line">Saldo GAMEOVER: -</div>
    </div>

    <button class="btn" onclick="connectWallet()">CONNECT WALLET</button>

    <label class="label">SEND</label>
    <input
      id="sendAmount"
      class="input-box"
      type="number"
      placeholder="Digite a quantidade"
    />

    <label class="label">RECEIVE</label>
    <input
      id="receiveToken"
      class="input-box"
      type="text"
      value="GAMEOVER"
      disabled
    />

    <button class="btn main-btn" onclick="fakeSwap()">PRESS START</button>

    <div class="footer">Retro DEX online 🚀</div>
  </div>

  <script>
    const GAMEOVER_ADDRESS = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";

    const ERC20_ABI = [
      "function balanceOf(address owner) view returns (uint256)",
      "function decimals() view returns (uint8)",
      "function symbol() view returns (string)"
    ];

    async function connectWallet() {
      if (!window.ethereum) {
        alert("Abra o site no navegador da MetaMask.");
        return;
      }

      try {
        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const accounts = await window.ethereum.request({
          method: "eth_requestAccounts"
        });

        const wallet = accounts[0];
        const shortWallet = wallet.slice(0, 6) + "..." + wallet.slice(-4);

        document.getElementById("walletStatus").innerText =
          "Wallet: " + shortWallet;

        const network = await provider.getNetwork();
        document.getElementById("networkStatus").innerText =
          "Rede: " + network.name + " (chainId " + network.chainId + ")";

        const nativeBalance = await provider.getBalance(wallet);
        document.getElementById("balance").innerText =
          "Saldo da rede: " + parseFloat(ethers.utils.formatEther(nativeBalance)).toFixed(4);

        const tokenContract = new ethers.Contract(GAMEOVER_ADDRESS, ERC20_ABI, provider);

        const [rawTokenBalance, decimals, symbol] = await Promise.all([
          tokenContract.balanceOf(wallet),
          tokenContract.decimals(),
          tokenContract.symbol()
        ]);

        const formattedTokenBalance = ethers.utils.formatUnits(rawTokenBalance, decimals);

        document.getElementById("gameoverBalance").innerText =
          "Saldo " + symbol + ": " + Number(formattedTokenBalance).toLocaleString("pt-BR", {
            maximumFractionDigits: 2
          });

      } catch (error) {
        console.error(error);
        alert("Erro ao conectar wallet ou ler o token.");
      }
    }

    function fakeSwap() {
      const amount = document.getElementById("sendAmount").value;

      if (!amount || Number(amount) <= 0) {
        alert("Digite um valor para testar.");
        return;
      }

      alert("Swap ainda é simulado. Próximo passo: ligar compra real do GAMEOVER.");
    }
  </script>
</body>
</html>
