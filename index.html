<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro DEX</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top, #2b0a5a 0%, #150329 35%, #07010e 70%, #000 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 430px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .brand {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 0.5px;
      color: #fff;
    }

    .sub {
      font-size: 13px;
      color: #b7a9d6;
      margin-top: 4px;
    }

    .wallet-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 16px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(168, 85, 247, 0.35);
      white-space: nowrap;
    }

    .card {
      background: rgba(18, 18, 28, 0.92);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 16px;
      box-shadow:
        0 20px 40px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
    }

    .network-warning {
      display: none;
      margin-bottom: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.35);
      color: #fecaca;
      font-size: 14px;
    }

    .switch-network-btn {
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 14px;
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }

    .swap-box {
      background: #181825;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      padding: 14px;
      margin-bottom: 10px;
    }

    .row-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      color: #a1a1b3;
      font-size: 13px;
    }

    .amount-row {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .amount-input {
      flex: 1;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 34px;
      font-weight: 700;
    }

    .amount-input::placeholder {
      color: #6f7285;
    }

    .token-pill {
      border: none;
      border-radius: 999px;
      background: #232338;
      color: #fff;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      min-width: 140px;
      text-align: center;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
    }

    .token-icon {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .switch-wrap {
      display: flex;
      justify-content: center;
      margin: -4px 0 6px;
      position: relative;
      z-index: 2;
    }

    .switch-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 4px solid #0f0f19;
      background: #232338;
      color: #fff;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    .details {
      margin-top: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.03);
      padding: 12px;
      font-size: 13px;
      color: #c7c9d6;
    }

    .details-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 6px 0;
    }

    .slippage-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .slippage-btn {
      border: 1px solid rgba(255,255,255,0.12);
      background: #232338;
      color: #fff;
      border-radius: 999px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .slippage-btn.active {
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      border-color: transparent;
    }

    .main-btn {
      width: 100%;
      margin-top: 14px;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: #fff;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      box-shadow: 0 12px 28px rgba(168, 85, 247, 0.32);
    }

    .main-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      text-align: center;
      font-size: 13px;
      color: #b7a9d6;
      min-height: 18px;
    }

    .footer {
      margin-top: 10px;
      text-align: center;
      color: #8d8fa3;
      font-size: 12px;
    }

    .mini {
      font-size: 12px;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div>
        <div class="brand">🎮 Retro DEX</div>
        <div class="sub">USDC ⇄ GAMEOVER · Arc Testnet</div>
      </div>
      <button class="wallet-btn" onclick="connectWallet()" id="walletBtn">
        Connect Wallet
      </button>
    </div>

    <div class="card">
      <div class="network-warning" id="networkWarning">
        Você está na rede errada.
        <button class="switch-network-btn" onclick="switchToArc()">
          Switch to Arc Testnet
        </button>
      </div>

      <div class="swap-box">
        <div class="row-top">
          <span>You pay</span>
          <span class="mini" id="balanceIn">Balance: -</span>
        </div>

        <div class="amount-row">
          <input
            id="amountIn"
            class="amount-input"
            type="number"
            inputmode="decimal"
            placeholder="0.0"
            oninput="handleAmountInput()"
          />
          <button class="token-pill" id="tokenInBtn" onclick="toggleDirection()">
            <img id="tokenInIcon" class="token-icon" src="https://cryptologos.cc/logos/usd-coin-usdc-logo.png" alt="USDC">
            <span id="tokenInText">USDC</span>
          </button>
        </div>
      </div>

      <div class="switch-wrap">
        <button class="switch-btn" onclick="toggleDirection()">⇅</button>
      </div>

      <div class="swap-box">
        <div class="row-top">
          <span>You receive</span>
          <span class="mini" id="balanceOut">Balance: -</span>
        </div>

        <div class="amount-row">
          <input
            id="amountOut"
            class="amount-input"
            type="text"
            placeholder="0.0"
            disabled
          />
          <button class="token-pill" id="tokenOutBtn" onclick="toggleDirection()">
            <img id="tokenOutIcon" class="token-icon" src="https://cdn-icons-png.flaticon.com/512/686/686589.png" alt="GAMEOVER">
            <span id="tokenOutText">GAMEOVER</span>
          </button>
        </div>
      </div>

      <div class="details">
        <div class="details-row">
          <span>Wallet</span>
          <span id="walletStatus">-</span>
        </div>
        <div class="details-row">
          <span>Network</span>
          <span id="networkStatus">-</span>
        </div>
        <div class="details-row">
          <span>Pair</span>
          <span class="mini" id="pairStatus">0xF55A...1D6d</span>
        </div>
        <div class="details-row">
          <span>Price</span>
          <span id="priceStatus">-</span>
        </div>
        <div class="details-row">
          <span>Slippage</span>
          <span id="slippageStatus">1%</span>
        </div>
        <div class="details-row">
          <span>Minimum received</span>
          <span id="minReceivedStatus">-</span>
        </div>

        <div class="slippage-row">
          <button class="slippage-btn active" onclick="setSlippage(1)" id="slippage1">1%</button>
          <button class="slippage-btn" onclick="setSlippage(0.5)" id="slippage05">0.5%</button>
          <button class="slippage-btn" onclick="setSlippage(2)" id="slippage2">2%</button>
        </div>
      </div>

      <button class="main-btn" id="swapBtn" onclick="executeSwap()" disabled>
        Enter amount
      </button>

      <div class="status" id="statusText"></div>
    </div>

    <div class="footer">retro-dex-two.vercel.app</div>
  </div>

  <script>
    const ARC_CHAIN_ID = 5042002;
    const ARC_CHAIN_ID_HEX = "0x4cef52";
    const USDC_ADDRESS = "0x3600000000000000000000000000000000000000";
    const GAMEOVER_ADDRESS = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";
    const PAIR_ADDRESS = "0xF55Abd9674b7faEF659cA7b01467324CFb731D6d";

    const USDC_ICON = "https://cryptologos.cc/logos/usd-coin-usdc-logo.png";
    const GAMEOVER_ICON = "https://cdn-icons-png.flaticon.com/512/686/686589.png";

    const ERC20_ABI = [
      "function approve(address spender, uint256 amount) returns (bool)",
      "function allowance(address owner, address spender) view returns (uint256)",
      "function balanceOf(address owner) view returns (uint256)",
      "function decimals() view returns (uint8)",
      "function symbol() view returns (string)"
    ];

    const PAIR_ABI = [
      "function swap(address tokenIn, uint256 amountIn) public",
      "function getAmountOut(address tokenIn, uint256 amountIn) view returns (uint256)",
      "function token0() view returns (address)",
      "function token1() view returns (address)",
      "function reserve0() view returns (uint256)",
      "function reserve1() view returns (uint256)"
    ];

    let provider;
    let signer;
    let userAddress = null;
    let direction = "USDC_TO_GAMEOVER";
    let slippagePercent = 1;

    function getTokenInAddress() {
      return direction === "USDC_TO_GAMEOVER" ? USDC_ADDRESS : GAMEOVER_ADDRESS;
    }

    function getTokenOutAddress() {
      return direction === "USDC_TO_GAMEOVER" ? GAMEOVER_ADDRESS : USDC_ADDRESS;
    }

    function getTokenInLabel() {
      return direction === "USDC_TO_GAMEOVER" ? "USDC" : "GAMEOVER";
    }

    function getTokenOutLabel() {
      return direction === "USDC_TO_GAMEOVER" ? "GAMEOVER" : "USDC";
    }

    function getTokenInIcon() {
      return direction === "USDC_TO_GAMEOVER" ? USDC_ICON : GAMEOVER_ICON;
    }

    function getTokenOutIcon() {
      return direction === "USDC_TO_GAMEOVER" ? GAMEOVER_ICON : USDC_ICON;
    }

    async function getTokenDecimals(tokenAddress) {
      const token = new ethers.Contract(tokenAddress, ERC20_ABI, provider);
      return await token.decimals();
    }

    function setStatus(text) {
      document.getElementById("statusText").innerText = text || "";
    }

    function shortAddress(addr) {
      return addr ? addr.slice(0, 6) + "..." + addr.slice(-4) : "-";
    }

    function updateDirectionUI() {
      document.getElementById("tokenInText").innerText = getTokenInLabel();
      document.getElementById("tokenOutText").innerText = getTokenOutLabel();
      document.getElementById("tokenInIcon").src = getTokenInIcon();
      document.getElementById("tokenOutIcon").src = getTokenOutIcon();
      document.getElementById("amountIn").placeholder = "0.0";
      document.getElementById("amountOut").value = "";
      document.getElementById("priceStatus").innerText = "-";
      document.getElementById("minReceivedStatus").innerText = "-";
      updateSwapButton();
      if (userAddress) {
        refreshBalances();
      }
    }

    function updateSwapButton() {
      const amount = document.getElementById("amountIn").value;
      const btn = document.getElementById("swapBtn");

      if (!userAddress) {
        btn.disabled = true;
        btn.innerText = "Connect Wallet";
        return;
      }

      if (!amount || Number(amount) <= 0) {
        btn.disabled = true;
        btn.innerText = "Enter amount";
        return;
      }

      btn.disabled = false;
      btn.innerText = `Swap ${getTokenInLabel()} for ${getTokenOutLabel()}`;
    }

    function setSlippage(value) {
      slippagePercent = value;
      document.getElementById("slippageStatus").innerText = `${value}%`;

      document.querySelectorAll(".slippage-btn").forEach((btn) => {
        btn.classList.remove("active");
      });

      if (value === 1) document.getElementById("slippage1").classList.add("active");
      if (value === 0.5) document.getElementById("slippage05").classList.add("active");
      if (value === 2) document.getElementById("slippage2").classList.add("active");

      handleAmountInput();
    }

    async function switchToArc() {
      if (!window.ethereum) {
        alert("Abra no navegador da MetaMask.");
        return;
      }

      try {
        await window.ethereum.request({
          method: "wallet_switchEthereumChain",
          params: [{ chainId: ARC_CHAIN_ID_HEX }]
        });
      } catch (switchError) {
        if (switchError.code === 4902) {
          try {
            await window.ethereum.request({
              method: "wallet_addEthereumChain",
              params: [{
                chainId: ARC_CHAIN_ID_HEX,
                chainName: "Arc Testnet",
                nativeCurrency: {
                  name: "USDC",
                  symbol: "USDC",
                  decimals: 18
                },
                rpcUrls: ["https://rpc.testnet.arc.network"],
                blockExplorerUrls: ["https://testnet.arcscan.app"]
              }]
            });
          } catch (addError) {
            console.error(addError);
            setStatus("Não foi possível adicionar a Arc Testnet.");
          }
        } else {
          console.error(switchError);
          setStatus("Não foi possível trocar para a Arc Testnet.");
        }
      }
    }

    async function connectWallet() {
      if (!window.ethereum) {
        alert("Abra no navegador da MetaMask.");
        return;
      }

      try {
        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send("eth_requestAccounts", []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        const network = await provider.getNetwork();
        document.getElementById("networkStatus").innerText =
          Number(network.chainId) === ARC_CHAIN_ID
            ? "Arc Testnet"
            : `${network.name || "Unknown"} (${network.chainId})`;

        document.getElementById("walletStatus").innerText = shortAddress(userAddress);
        document.getElementById("walletBtn").innerText = shortAddress(userAddress);

        const isArc = Number(network.chainId) === ARC_CHAIN_ID;
        document.getElementById("networkWarning").style.display = isArc ? "none" : "block";

        await refreshBalances();
        updateSwapButton();
        await handleAmountInput();
        setStatus("Wallet conectada.");
      } catch (err) {
        console.error(err);
        setStatus("Erro ao conectar wallet.");
      }
    }

    async function refreshBalances() {
      if (!provider || !userAddress) return;

      try {
        const tokenIn = new ethers.Contract(getTokenInAddress(), ERC20_ABI, provider);
        const tokenOut = new ethers.Contract(getTokenOutAddress(), ERC20_ABI, provider);

        const [balInRaw, balOutRaw, decIn, decOut] = await Promise.all([
          tokenIn.balanceOf(userAddress),
          tokenOut.balanceOf(userAddress),
          tokenIn.decimals(),
          tokenOut.decimals()
        ]);

        const balIn = Number(ethers.utils.formatUnits(balInRaw, decIn));
        const balOut = Number(ethers.utils.formatUnits(balOutRaw, decOut));

        document.getElementById("balanceIn").innerText =
          `Balance: ${balIn.toLocaleString("pt-BR", { maximumFractionDigits: 4 })} ${getTokenInLabel()}`;

        document.getElementById("balanceOut").innerText =
          `Balance: ${balOut.toLocaleString("pt-BR", { maximumFractionDigits: 4 })} ${getTokenOutLabel()}`;
      } catch (err) {
        console.error(err);
        setStatus("Erro ao ler saldos.");
      }
    }

    function toggleDirection() {
      direction = direction === "USDC_TO_GAMEOVER"
        ? "GAMEOVER_TO_USDC"
        : "USDC_TO_GAMEOVER";

      updateDirectionUI();
      handleAmountInput();
    }

    async function handleAmountInput() {
      updateSwapButton();

      const amountText = document.getElementById("amountIn").value;
      const output = document.getElementById("amountOut");

      if (!amountText || Number(amountText) <= 0 || !provider) {
        output.value = "";
        document.getElementById("priceStatus").innerText = "-";
        document.getElementById("minReceivedStatus").innerText = "-";
        return;
      }

      try {
        const pair = new ethers.Contract(PAIR_ADDRESS, PAIR_ABI, provider);
        const tokenInAddress = getTokenInAddress();
        const decIn = await getTokenDecimals(tokenInAddress);

        const amountIn = ethers.utils.parseUnits(amountText, decIn);
        const amountOutRaw = await pair.getAmountOut(tokenInAddress, amountIn);

        const decOut = await getTokenDecimals(getTokenOutAddress());
        const amountOut = ethers.utils.formatUnits(amountOutRaw, decOut);
        const amountOutNum = Number(amountOut);
        const amountInNum = Number(amountText);

        output.value = amountOutNum.toLocaleString("pt-BR", {
          maximumFractionDigits: 6
        });

        if (amountInNum > 0 && amountOutNum > 0) {
          const price = amountOutNum / amountInNum;
          const minReceived = amountOutNum * (1 - slippagePercent / 100);

          document.getElementById("priceStatus").innerText =
            `1 ${getTokenInLabel()} = ${price.toLocaleString("pt-BR", {
              maximumFractionDigits: 6
            })} ${getTokenOutLabel()}`;

          document.getElementById("minReceivedStatus").innerText =
            `${minReceived.toLocaleString("pt-BR", {
              maximumFractionDigits: 6
            })} ${getTokenOutLabel()}`;
        }
      } catch (err) {
        console.error(err);
        output.value = "";
        document.getElementById("priceStatus").innerText = "-";
        document.getElementById("minReceivedStatus").innerText = "-";
        setStatus("Não foi possível calcular o valor de saída.");
      }
    }

    async function executeSwap() {
      if (!window.ethereum) {
        alert("Abra no navegador da MetaMask.");
        return;
      }

      if (!userAddress) {
        await connectWallet();
        return;
      }

      try {
        const network = await provider.getNetwork();
        if (Number(network.chainId) !== ARC_CHAIN_ID) {
          alert("Troque para a Arc Testnet.");
          return;
        }

        const amountText = document.getElementById("amountIn").value;
        if (!amountText || Number(amountText) <= 0) {
          alert("Digite um valor.");
          return;
        }

        const tokenInAddress = getTokenInAddress();
        const decIn = await getTokenDecimals(tokenInAddress);
        const amountIn = ethers.utils.parseUnits(amountText, decIn);

        const tokenIn = new ethers.Contract(tokenInAddress, ERC20_ABI, signer);
        const pair = new ethers.Contract(PAIR_ADDRESS, PAIR_ABI, signer);

        setStatus(`Aprovando ${getTokenInLabel()}...`);
        const approveTx = await tokenIn.approve(PAIR_ADDRESS, amountIn);
        await approveTx.wait();

        setStatus(`Fazendo swap ${getTokenInLabel()} → ${getTokenOutLabel()}...`);
        const swapTx = await pair.swap(tokenInAddress, amountIn);
        await swapTx.wait();

        setStatus("Swap concluído com sucesso 🚀");
        document.getElementById("amountIn").value = "";
        document.getElementById("amountOut").value = "";
        document.getElementById("priceStatus").innerText = "-";
        document.getElementById("minReceivedStatus").innerText = "-";
        await refreshBalances();
        updateSwapButton();
      } catch (err) {
        console.error(err);
        setStatus("Erro no swap. Veja o console ou tente de novo.");
        alert("Erro no swap.");
      }
    }

    if (window.ethereum) {
      window.ethereum.on("accountsChanged", async (accounts) => {
        if (!accounts.length) {
          userAddress = null;
          document.getElementById("walletStatus").innerText = "-";
          document.getElementById("walletBtn").innerText = "Connect Wallet";
          document.getElementById("balanceIn").innerText = "Balance: -";
          document.getElementById("balanceOut").innerText = "Balance: -";
          document.getElementById("amountOut").value = "";
          document.getElementById("priceStatus").innerText = "-";
          document.getElementById("minReceivedStatus").innerText = "-";
          updateSwapButton();
          setStatus("Wallet desconectada.");
          return;
        }

        userAddress = accounts[0];
        signer = provider.getSigner();
        document.getElementById("walletStatus").innerText = shortAddress(userAddress);
        document.getElementById("walletBtn").innerText = shortAddress(userAddress);
        await refreshBalances();
        await handleAmountInput();
      });

      window.ethereum.on("chainChanged", () => {
        window.location.reload();
      });
    }

    updateDirectionUI();
  </script>
</body>
  </html>
