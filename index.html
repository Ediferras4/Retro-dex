<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Retro DEX</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<style>
body {
  background:#0b0b0f;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.dex {
  width:380px;
  background:#111;
  padding:20px;
  border-radius:20px;
}

.box {
  background:#000;
  padding:15px;
  border-radius:15px;
  margin-top:10px;
}

.row {
  display:flex;
  justify-content:space-between;
}

input {
  background:none;
  border:none;
  color:white;
  font-size:20px;
  width:100%;
}

button {
  width:100%;
  margin-top:10px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#6c5ce7;
  color:white;
}
</style>

</head>

<body>

<div class="dex">

<h2>Retro DEX</h2>

<div class="box">
SEND
<div class="row">
<input id="amount" placeholder="0.0">
<span id="tokenA">USDC</span>
</div>
</div>

<div class="box">
RECEIVE
<div class="row">
<input id="output" disabled>
<span id="tokenB">GAMEOVER</span>
</div>
</div>

<button onclick="connect()">CONNECT</button>
<button onclick="swap()">SWAP</button>

<div id="status"></div>

</div>

<script>

const USDC = "0x3600000000000000000000000000000000000000";
const GAMEOVER = "0x706abf10e96a1bb91F8F82740fcfABDa0F940843";
const PAIR = "0x3e0f14368f385CE4c5c5d4B816Ec8c8c475c63F0";

const ERC20 = [
"function approve(address spender,uint amount) returns(bool)"
];

const PAIR_ABI = [
"function swap(address tokenIn,uint amountIn)"
];

let tokenIn = USDC;

async function connect(){
 await window.ethereum.request({ method: 'eth_requestAccounts' });
 document.getElementById("status").innerText="Wallet conectada";
}

async function swap(){
 try{

 const provider = new ethers.providers.Web3Provider(window.ethereum);
 const signer = provider.getSigner();

 const amount = document.getElementById("amount").value;

 const decimals = tokenIn === USDC ? 6 : 18;
 const amountIn = ethers.utils.parseUnits(amount, decimals);

 const token = new ethers.Contract(tokenIn, ERC20, signer);

 document.getElementById("status").innerText="Aprovando...";

 await token.approve(PAIR, amountIn);

 document.getElementById("status").innerText="Swapping...";

 const pair = new ethers.Contract(PAIR, PAIR_ABI, signer);
 await pair.swap(tokenIn, amountIn);

 document.getElementById("status").innerText="Swap feito 🚀";

 }catch(e){
 console.log(e);
 document.getElementById("status").innerText="Erro";
 }

}

</script>

</body>

</html>
