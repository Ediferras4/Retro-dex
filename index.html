<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Retro DEX</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-top: #f7f4fc;
      --bg-mid: #f1edf8;
      --bg-bottom: #ece8f6;

      --text-main: #6b6888;
      --text-strong: #5f5b80;
      --text-soft: #7c7899;
      --text-dim: #908ca8;

      --purple-1: #b98cff;
      --purple-2: #956eff;
      --purple-3: #7858f2;
      --purple-4: #6847e6;

      --blue-line: rgba(105, 170, 255, 0.52);
      --blue-line-2: rgba(105, 170, 255, 0.30);
      --blue-line-3: rgba(105, 170, 255, 0.18);
      --blue-line-strong: rgba(105, 170, 255, 0.82);

      --footer-blue-bg: rgba(125, 175, 255, 0.20);
      --footer-blue-bg-2: rgba(88, 155, 255, 0.10);
      --footer-text: rgba(238, 247, 255, 0.96);

      --success-bg: linear-gradient(90deg, #a47eff 0%, #8b67ff 45%, #7655f0 100%);
      --success-shadow:
        0 8px 18px rgba(127, 93, 245, 0.24),
        0 0 18px rgba(161, 125, 255, 0.14),
        inset 0 1px 0 rgba(255,255,255,0.34);

      --danger: #ef6b7e;
      --danger-soft: #b55f73;
      --danger-line: rgba(239, 107, 126, 0.42);

      --gold-1: #f7c767;
      --gold-2: #ffde8a;
      --gold-3: #b98720;

      --card-white: rgba(255,255,255,0.96);
      --glass-top: rgba(255,255,255,0.62);
      --glass-bottom: rgba(244,240,250,0.88);

      --overlay-bg: rgba(145, 128, 210, 0.18);
      --search-panel-bg:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(243,238,251,0.98));
      --sheet-bg:
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(243,238,251,0.98));
    }

    html[data-theme="dark"] {
      --bg-top: #08101f;
      --bg-mid: #10182b;
      --bg-bottom: #141d31;

      --text-main: #e8efff;
      --text-strong: #ffffff;
      --text-soft: #b9c7ee;
      --text-dim: #8ba0d4;

      --purple-1: #c39cff;
      --purple-2: #a57dff;
      --purple-3: #8d67ff;
      --purple-4: #b89cff;

      --blue-line: rgba(119, 180, 255, 0.42);
      --blue-line-2: rgba(119, 180, 255, 0.22);
      --blue-line-3: rgba(119, 180, 255, 0.12);
      --blue-line-strong: rgba(119, 180, 255, 0.72);

      --footer-blue-bg: rgba(48, 80, 142, 0.28);
      --footer-blue-bg-2: rgba(28, 48, 92, 0.24);
      --footer-text: rgba(238, 247, 255, 0.96);

      --success-bg: linear-gradient(90deg, #8b67ff 0%, #7d61ff 45%, #5ea7ff 100%);
      --success-shadow:
        0 8px 18px rgba(82, 102, 255, 0.22),
        0 0 20px rgba(94, 167, 255, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.16);

      --danger: #ff8fa2;
      --danger-soft: #ffb7c3;
      --danger-line: rgba(255, 143, 162, 0.34);

      --card-white: rgba(16, 24, 43, 0.96);
      --glass-top: rgba(18, 28, 50, 0.84);
      --glass-bottom: rgba(16, 24, 43, 0.94);

      --overlay-bg: rgba(6, 10, 18, 0.54);
      --search-panel-bg:
        linear-gradient(180deg, rgba(16,24,43,0.96), rgba(12,19,34,0.98));
      --sheet-bg:
        linear-gradient(180deg, rgba(16,24,43,0.98), rgba(12,19,34,0.99));
    }

    html, body {
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top center, rgba(184,160,255,0.16), transparent 26%),
        linear-gradient(180deg, var(--bg-top), var(--bg-mid) 45%, var(--bg-bottom));
      transition: background 0.25s ease, color 0.25s ease;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font-family: inherit;
    }

    .app {
      width: 100%;
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04));
    }

    html[data-theme="dark"] .app {
      background:
        radial-gradient(circle at top center, rgba(94, 167, 255, 0.05), transparent 24%),
        linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .fixed-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 10px 0 8px;
      background:
        linear-gradient(
          180deg,
          rgba(247,244,252,0.92) 0%,
          rgba(241,237,248,0.82) 70%,
          rgba(241,237,248,0.20) 100%
        );
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 10px 26px rgba(146, 125, 214, 0.10),
        0 1px 0 rgba(255,255,255,0.94);
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    html[data-theme="dark"] .fixed-top {
      background:
        linear-gradient(
          180deg,
          rgba(10,16,28,0.92) 0%,
          rgba(12,19,34,0.86) 72%,
          rgba(12,19,34,0.20) 100%
        );
      box-shadow:
        0 10px 26px rgba(0, 0, 0, 0.28),
        0 1px 0 rgba(255,255,255,0.04);
    }

    .header-shell {
      position: relative;
      height: 100px;
      margin: 0 10px;
      border-radius: 30px;
      overflow: hidden;
      background:
        linear-gradient(180deg, var(--glass-top), var(--glass-bottom));
      border: 1.7px solid rgba(255,255,255,0.98);
      box-shadow:
        0 14px 30px rgba(157,136,220,0.16),
        0 0 0 1.3px var(--blue-line),
        inset 0 1px 0 rgba(255,255,255,0.98),
        inset 0 -1px 0 rgba(195,182,232,0.18),
        inset 0 0 0 1.2px var(--blue-line-2);
      transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    html[data-theme="dark"] .header-shell {
      border-color: rgba(255,255,255,0.06);
      box-shadow:
        0 14px 30px rgba(0,0,0,0.26),
        0 0 0 1.3px var(--blue-line),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 -1px 0 rgba(255,255,255,0.02),
        inset 0 0 0 1.2px var(--blue-line-2);
    }

    .header-shell::before {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 26px;
      border: 1px solid var(--blue-line-3);
      pointer-events: none;
    }

    .header-shell::after {
      content: "";
      left: 72px;
      right: 88px;
      top: 31px;
      height: 24px;
      position: absolute;
      border-top: 2px solid rgba(120, 185, 255, 0.36);
      border-radius: 50%;
      transform: rotate(-1deg);
      opacity: 0.95;
      pointer-events: none;
    }

    .face {
      position: absolute;
      left: 18px;
      top: 16px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.94), rgba(244,239,251,0.98));
      border: 2px solid rgba(255,255,255,0.98);
      box-shadow:
        0 10px 22px rgba(153,130,220,0.12),
        0 0 18px rgba(137,104,255,0.10),
        0 0 0 1.2px var(--blue-line),
        inset 0 1px 0 #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      overflow: hidden;
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    html[data-theme="dark"] .face {
      background:
        linear-gradient(180deg, rgba(26,37,66,0.96), rgba(18,28,50,0.98));
      border-color: rgba(255,255,255,0.06);
      box-shadow:
        0 10px 22px rgba(0,0,0,0.20),
        0 0 18px rgba(94,167,255,0.08),
        0 0 0 1.2px var(--blue-line),
        inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .face img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      display: block;
      mix-blend-mode: normal;
    }

    .header-actions {
      position: absolute;
      right: 12px;
      top: 18px;
      width: 235px;
      height: 54px;
      border-radius: 999px;
      padding: 5px;
      display: flex;
      align-items: center;
      gap: 8px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.34), rgba(242,237,251,0.78));
      border: 1.3px solid rgba(255,255,255,0.94);
      box-shadow:
        0 10px 22px rgba(155,135,218,0.08),
        0 0 0 1.2px var(--blue-line),
        inset 0 1px 0 rgba(255,255,255,0.94),
        inset 0 0 0 1px var(--blue-line-2);
      z-index: 2;
      transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    html[data-theme="dark"] .header-actions {
      background:
        linear-gradient(180deg, rgba(20,30,54,0.84), rgba(16,24,43,0.96));
      border-color: rgba(255,255,255,0.05);
      box-shadow:
        0 10px 22px rgba(0,0,0,0.18),
        0 0 0 1.2px var(--blue-line),
        inset 0 1px 0 rgba(255,255,255,0.05),
        inset 0 0 0 1px var(--blue-line-2);
    }

    .top-gear-btn {
      width: 48px;
      height: 42px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--purple-3);
      background: rgba(255,255,255,0.24);
      border: 1px solid var(--blue-line);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.58),
        0 0 0 1px var(--blue-line-3);
      flex: 0 0 auto;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background 0.25s ease;
    }

    html[data-theme="dark"] .top-gear-btn {
      background: rgba(255,255,255,0.03);
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.04),
        0 0 0 1px var(--blue-line-3);
    }

    .top-gear-btn:active,
    .connect-btn:active {
      transform: scale(0.98);
    }

    .top-gear-btn:hover {
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,0.58),
        0 0 0 1px var(--blue-line-3),
        0 0 14px rgba(150, 170, 255, 0.14);
    }

    .top-gear-btn svg {
      width: 22px;
      height: 22px;
    }

    .connect-btn {
      flex: 1;
      height: 42px;
      border: none;
      border-radius: 999px;
      color: #fff;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .15px;
      background: var(--success-bg);
      box-shadow: var(--success-shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 0 12px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.18s ease, opacity 0.16s ease;
    }

    .connect-btn.connected {
      background: linear-gradient(90deg, #c8a9ff 0%, #ab8bff 45%, #8c6af5 100%);
    }

    .connect-btn:disabled {
      opacity: 0.72;
      cursor: not-allowed;
    }

    .connect-btn svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }

    .header-divider {
      height: 2px;
      margin: 10px 10px 0;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(162, 144, 227, 0.18),
        var(--blue-line-strong),
        rgba(162, 144, 227, 0.18),
        transparent
      );
      box-shadow:
        0 3px 10px rgba(145,115,255,0.08),
        0 0 12px rgba(105,170,255,0.12);
    }

    .fixed-bottom {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 100;
      padding: 8px 0 10px;
      background:
        linear-gradient(
          180deg,
          rgba(110, 170, 255, 0.04) 0%,
          rgba(110, 170, 255, 0.10) 18%,
          rgba(125, 175, 255, 0.18) 100%
        );
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 -10px 26px rgba(96, 148, 255, 0.12),
        0 -1px 0 rgba(255,255,255,0.30);
      transition: background 0.25s ease, box-shadow 0.25s ease;
    }

    html[data-theme="dark"] .fixed-bottom {
      background:
        linear-gradient(
          180deg,
          rgba(18, 28, 50, 0.04) 0%,
          rgba(18, 28, 50, 0.22) 18%,
          rgba(18, 28, 50, 0.42) 100%
        );
      box-shadow:
        0 -10px 26px rgba(0, 0, 0, 0.18),
        0 -1px 0 rgba(255,255,255,0.03);
    }

    .bottom-divider {
      height: 2px;
      margin: 0 10px 6px;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(110, 175, 255, 0.34),
        rgba(110, 175, 255, 0.94),
        rgba(110, 175, 255, 0.34),
        transparent
      );
      box-shadow:
        0 0 16px rgba(110, 175, 255, 0.22),
        0 0 5px rgba(110, 175, 255, 0.24);
    }

    .bottom-shell {
      margin: 0 10px;
      height: 56px;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(180deg, var(--footer-blue-bg), var(--footer-blue-bg-2));
      border: 1.5px solid rgba(185, 222, 255, 0.34);
      box-shadow:
        0 0 0 1.2px var(--blue-line-2),
        inset 0 1px 0 rgba(255,255,255,0.26),
        inset 0 0 0 1px rgba(110, 175, 255, 0.14);
      position: relative;
      overflow: hidden;
    }

    .bottom-shell::before {
      content: "";
      position: absolute;
      left: 4px;
      right: 4px;
      top: 4px;
      bottom: 4px;
      border-radius: 18px;
      border: 1px solid rgba(170, 215, 255, 0.16);
      pointer-events: none;
    }

    .bottom-text {
      position: relative;
      z-index: 2;
      color: var(--footer-text);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.08),
        0 0 12px rgba(110, 175, 255, 0.12);
    }

    .content {
      padding: 142px 10px 110px;
    }

    .icon-stroke {
      stroke: currentColor;
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .icon-fill {
      fill: currentColor;
    }

    @media (max-width: 420px) {
      .fixed-top {
        padding: 8px 0 8px;
      }

      .header-shell {
        margin: 0 8px;
        height: 96px;
      }

      .face {
        left: 16px;
        top: 16px;
        width: 66px;
        height: 66px;
      }

      .header-actions {
        width: 212px;
        height: 50px;
        right: 10px;
        top: 19px;
      }

      .top-gear-btn {
        width: 44px;
        height: 40px;
      }

      .top-gear-btn svg {
        width: 20px;
        height: 20px;
      }

      .connect-btn {
        height: 40px;
        font-size: 12px;
        gap: 7px;
        padding: 0 10px;
      }

      .connect-btn svg {
        width: 14px;
        height: 14px;
      }

      .header-divider {
        margin: 10px 8px 0;
      }

      .bottom-divider {
        margin: 0 8px 5px;
      }

      .bottom-shell {
        margin: 0 8px;
        height: 52px;
      }

      .bottom-text {
        font-size: 14px;
      }

      .content {
        padding: 134px 8px 100px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <style>
      .nav-shell {
        height: 82px;
        border-radius: 30px;
        padding: 8px 6px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.50), rgba(244,239,251,0.80));
        border: 1.7px solid rgba(255,255,255,0.98);
        box-shadow:
          0 10px 20px rgba(158,139,221,0.09),
          0 0 0 1.2px var(--blue-line),
          inset 0 1px 0 rgba(255,255,255,0.98),
          inset 0 0 0 1px var(--blue-line-2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }

      html[data-theme="dark"] .nav-shell {
        background:
          linear-gradient(180deg, rgba(16,24,43,0.88), rgba(12,19,34,0.98));
        border-color: rgba(255,255,255,0.05);
        box-shadow:
          0 10px 20px rgba(0,0,0,0.18),
          0 0 0 1.2px var(--blue-line),
          inset 0 1px 0 rgba(255,255,255,0.05),
          inset 0 0 0 1px var(--blue-line-2);
      }

      .nav-item {
        position: relative;
        flex: 1;
        height: 100%;
        border: none;
        background: transparent;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        color: #736f8f;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: .15px;
        cursor: pointer;
        border-radius: 24px;
        transition:
          color 0.16s ease,
          background 0.16s ease,
          box-shadow 0.16s ease,
          transform 0.16s ease;
      }

      html[data-theme="dark"] .nav-item {
        color: var(--text-soft);
      }

      .nav-item svg {
        width: 20px;
        height: 20px;
      }

      .nav-item.search-item {
        flex: .78;
      }

      .nav-item + .nav-item::before {
        content: "";
        position: absolute;
        left: 0;
        top: 16px;
        bottom: 16px;
        width: 1.5px;
        background: linear-gradient(
          180deg,
          rgba(105,170,255,0.12),
          rgba(105,170,255,0.72),
          rgba(105,170,255,0.12)
        );
      }

      .nav-item.active {
        color: var(--purple-4);
        background:
          linear-gradient(180deg, rgba(255,255,255,0.55), rgba(240,234,252,0.84));
        box-shadow:
          0 0 0 1px var(--blue-line-2),
          inset 0 1px 0 rgba(255,255,255,0.96),
          0 8px 18px rgba(145,114,230,0.08);
      }

      html[data-theme="dark"] .nav-item.active {
        background:
          linear-gradient(180deg, rgba(30,42,72,0.92), rgba(18,28,50,0.98));
        box-shadow:
          0 0 0 1px var(--blue-line-2),
          inset 0 1px 0 rgba(255,255,255,0.04),
          0 8px 18px rgba(0,0,0,0.18);
      }

      .panel-shell {
        padding: 6px;
        border-radius: 36px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.20), rgba(255,255,255,0.05));
        box-shadow:
          0 12px 22px rgba(155,135,220,0.06),
          0 0 0 1px var(--blue-line-2);
      }

      html[data-theme="dark"] .panel-shell {
        background:
          linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.00));
      }

      .panel-card {
        position: relative;
        border-radius: 34px;
        padding: 16px 16px 0;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.52), rgba(244,239,251,0.84));
        border: 1.7px solid rgba(255,255,255,0.98);
        box-shadow:
          0 12px 26px rgba(159,140,221,0.12),
          0 0 0 1.2px var(--blue-line),
          inset 0 1px 0 rgba(255,255,255,0.98),
          inset 0 0 0 1px var(--blue-line-2);
        transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }

      html[data-theme="dark"] .panel-card {
        background:
          linear-gradient(180deg, rgba(16,24,43,0.96), rgba(12,19,34,0.99));
        border-color: rgba(255,255,255,0.05);
        box-shadow:
          0 12px 26px rgba(0,0,0,0.24),
          0 0 0 1.2px var(--blue-line),
          inset 0 1px 0 rgba(255,255,255,0.05),
          inset 0 0 0 1px var(--blue-line-2);
      }

      .fields-area {
        position: relative;
        padding-bottom: 22px;
      }

      .field {
        min-height: 124px;
        border-radius: 32px;
        padding: 18px 22px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        background:
          linear-gradient(180deg, rgba(255,255,255,0.36), rgba(246,242,252,0.66));
        border: 1.7px solid rgba(255,255,255,0.96);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.96),
          inset 0 0 0 1px var(--blue-line-2),
          0 10px 16px rgba(156,136,220,0.06),
          0 0 0 1px var(--blue-line-3);
        transition: background 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      }

      html[data-theme="dark"] .field {
        background:
          linear-gradient(180deg, rgba(20,30,54,0.88), rgba(16,24,43,0.96));
        border-color: rgba(255,255,255,0.04);
        box-shadow:
          inset 0 1px 0 rgba(255,255,255,0.04),
          inset 0 0 0 1px var(--blue-line-2),

          searchToken: "Buscar Token",
          searchPlaceholder: "Nombre del token o contrato...",
          ok: "OK",
          welcomeFooter: "Bienvenido a Arc Testnet"
        }
      };

      function openGearSheet() {
        closeBottomSheet();
        closeWalletSheet();
        closeSlippageSheet();
        closeSearchSheet();
        closeProfileSheet();
        document.getElementById("gearSheet").classList.add("show");
        document.getElementById("gearBackdrop").classList.add("show");

      function closeGearSheet() {
        document.getElementById("gearSheet").classList.remove("show");
        document.getElementById("gearBackdrop").classList.remove("show");

      function openProfileSheet() {
        closeBottomSheet();
        closeWalletSheet();
        closeSlippageSheet();
        closeSearchSheet();
        closeGearSheet();
        document.getElementById("profileSheet").classList.add("show");
        document.getElementById("profileBackdrop").classList.add("show");

        document.getElementById("profileSheet").classList.remove("show");
        document.getElementById("profileBackdrop").classList.remove("show");
      }

      function openSearchSheet() {
        closeBottomSheet();
        closeWalletSheet();
        closeSlippageSheet();
        closeGearSheet();
        closeProfileSheet();
        document.getElementById("searchSheet").classList.add("show");
        document.getElementById("searchBackdrop").classList.add("show");
      }

      function closeSearchSheet() {
        document.getElementById("searchSheet").classList.remove("show");
        document.getElementById("searchBackdrop").classList.remove("show");
      }

      function toggleTheme() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        html.setAttribute("data-theme", currentTheme === "dark" ? "light" : "dark");
        updateThemeButton();
      }

      function updateThemeButton() {
        const html = document.documentElement;
        const currentTheme = html.getAttribute("data-theme");
        const btn = document.querySelector(".theme-toggle-btn");

        if (!btn) return;

        if (currentLanguage === "en") {
          btn.innerText = currentTheme === "dark" ? "☀ Light Mode" : "🌙 Dark Mode";
        } else {
          btn.innerText = currentTheme === "dark" ? "☀ Modo Claro" : "🌙 Modo Oscuro";
        }
      }

      function toggleLanguage() {
        currentLanguage = currentLanguage === "en" ? "es" : "en";
        applyTranslations();
      }

      function applyTranslations() {
        const t = translations[currentLanguage];

        const profileBtn = document.querySelector(".connect-btn");
        if (profileBtn && !userAddress) {
          profileBtn.innerText = t.profile;
        }

        const gearTitle = document.querySelector("#gearSheet .card-title");
        if (gearTitle) gearTitle.innerText = t.preferences;

        const langBtn = document.querySelector(".lang-toggle-btn");
        if (langBtn) {
          langBtn.innerText = currentLanguage === "en" ? "🌐 English" : "🌐 Español";
        }

        const searchTitle = document.querySelector("#searchSheet .card-title");
        if (searchTitle) searchTitle.innerText = t.searchToken;

        const searchInput = document.querySelector(".search-pill-input");
        if (searchInput) searchInput.placeholder = t.searchPlaceholder;

        const searchOkBtn = document.querySelector(".search-ok-btn");
        if (searchOkBtn) searchOkBtn.innerText = t.ok;

        const footerText = document.querySelector(".bottom-text");
        if (footerText) footerText.innerText = t.welcomeFooter;

        updateThemeButton();
      }

      function updateWalletButton() {
        const btn = document.getElementById("walletBtn");
        if (!btn) return;

        if (userAddress) {
          btn.innerText = currentLanguage === "en" ? "Disconnect" : "Desconectar";
          btn.classList.add("connected");
        } else {
          btn.innerText = currentLanguage === "en" ? "Profile" : "Perfil";
          btn.classList.remove("connected");
        }
      }

      function shortAddress(addr) {
        return addr ? addr.slice(0, 6) + "..." + addr.slice(-4) : "-";
      }

      function formatDisplayNumber(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) return "-";
        if (num === 0) return "0";
        if (Math.abs(num) >= 1000) return num.toFixed(4).replace(/\.?0+$/, "");
        if (Math.abs(num) >= 1) return num.toFixed(6).replace(/\.?0+$/, "");
        return num.toFixed(8).replace(/\.?0+$/, "");
      }

      function formatBalanceNumber(value) {
        const num = Number(value);
        if (!Number.isFinite(num)) return "-";
        return num.toLocaleString("en-US", { maximumFractionDigits: 4 });
      }

      function trimMaxAmount(balanceNum, decimals) {
        if (!Number.isFinite(balanceNum) || balanceNum <= 0) return 0;
        const safeDecimals = decimals <= 6 ? 4 : 6;
        const factor = 10 ** safeDecimals;
        return Math.floor(balanceNum * factor) / factor;
      }

      function normalizeAmountInput(raw) {
        let value = String(raw || "").replace(",", ".").replace(/[^\d.]/g, "");
        const firstDot = value.indexOf(".");
        if (firstDot !== -1) {
          value = value.slice(0, firstDot + 1) + value.slice(firstDot + 1).replace(/\./g, "");
        }
        return value;
      }

        if (tab === "swap") {

        if (backdrop) backdrop.classList.remove("show");

        if (currentScreen === "swap") updatePrimaryTabs("swap");
        else if (currentScreen === "payment") updatePrimaryTabs("payment");
        else clearPrimaryTabs();
      }

      function openWalletSheet() {
        closeBottomSheet();
        closeSlippageSheet();
        closeSearchSheet();
        const sheet = document.getElementById("walletSheet");
        const backdrop = document.getElementById("walletSheetBackdrop");
        if (sheet) sheet.classList.add("show");
        if (backdrop) backdrop.classList.add("show");
      }

      function closeWalletSheet() {
        const sheet = document.getElementById("walletSheet");
        const backdrop = document.getElementById("walletSheetBackdrop");
        if (sheet) sheet.classList.remove("show");
        if (backdrop) backdrop.classList.remove("show");
      }

      function openSlippageSheet() {
        closeBottomSheet();
        closeWalletSheet();
        closeSearchSheet();
        const sheet = document.getElementById("slippageSheet");
        const backdrop = document.getElementById("slippageBackdrop");
        if (sheet) sheet.classList.add("show");
        if (backdrop) backdrop.classList.add("show");
      }

      function closeSlippageSheet() {
        const sheet = document.getElementById("slippageSheet");
        const backdrop = document.getElementById("slippageBackdrop");
        if (sheet) sheet.classList.remove("show");
        if (backdrop) backdrop.classList.remove("show");
      }

      function updateSlippageUI() {
        const status = document.getElementById("slippageStatus");
        const label = document.getElementById("slippageButtonLabel");
        const payLabel = document.getElementById("previewSlippage");

        if (status) status.innerText = slippageMode === "auto" ? "Auto" : `${slippagePercent}%`;
        if (label) label.innerText = slippageMode === "auto" ? "Auto · 0.5%" : `${slippagePercent}%`;
        if (payLabel) payLabel.innerText = slippageMode === "auto" ? "Auto · 0.5%" : `${slippagePercent}%`;
      }

      function setSlippageMode(value) {
        if (value === "auto") {
          slippageMode = "auto";
          slippagePercent = 0.5;
        } else {
          slippageMode = "manual";
          slippagePercent = value;
        }

        updateSlippageUI();
        closeSlippageSheet();
        handleAmountInput();
        updatePaymentPreview();
      }

      function updateQuickAmountsVisibility() {
        const quick = document.getElementById("quickAmounts");
        const input = document.getElementById("amountIn");
        if (!quick || !input) return;
        const normalized = normalizeAmountInput(input.value);
        const hasValue = normalized !== "" && Number(normalized) > 0;
        const shouldShow = amountInputFocused || hasValue;
        quick.classList.toggle("show", shouldShow);
      }

      function getCurrentBalanceText() {
        return `Balance: ${formatBalanceNumber(currentTokenInBalance)} ${getTokenInLabel()}`;
      }

      function getZeroBalanceLabel() {
        return `No ${getTokenInLabel()} balance`;
      }

      function getInsufficientLabel() {
        return `Insufficient ${getTokenInLabel()}`;
      }

      function setInputErrorState(isInsufficient) {
        const input = document.getElementById("amountIn");
        const balanceIn = document.getElementById("balanceIn");
        if (input) input.classList.toggle("insufficient", isInsufficient);
        if (balanceIn) balanceIn.classList.toggle("insufficient", isInsufficient);
      }

      function tokenInBalanceIsZero() {
        return !Number.isFinite(currentTokenInBalance) || currentTokenInBalance <= 0;
      }

      function handleAmountFocus() {
        amountInputFocused = true;
        updateQuickAmountsVisibility();

        if (tokenInBalanceIsZero()) {
          const input = document.getElementById("amountIn");
          if (input) input.blur();
          setStatus(getZeroBalanceLabel());
        }
      }

      function handleAmountBlur() {
        amountInputFocused = false;
        setTimeout(() => updateQuickAmountsVisibility(), 100);
      }

      function handleAmountClick() {
        if (tokenInBalanceIsZero()) setStatus(getZeroBalanceLabel());
      }

      function handleAmountKeydown(event) {
        if (tokenInBalanceIsZero()) {
          const allowedKeys = ["Tab", "Escape"];
          if (!allowedKeys.includes(event.key)) {
            event.preventDefault();
            setStatus(getZeroBalanceLabel());
          }
        }
      }

      async function getTokenDecimals(tokenAddress) {
        const token = new ethers.Contract(tokenAddress, ERC20_ABI, provider);
        return await token.decimals();
      }

      async function getTokenInBalance() {
        if (!provider || !userAddress) return null;

        const tokenIn = new ethers.Contract(getTokenInAddress(), ERC20_ABI, provider);
        const [balInRaw, decIn] = await Promise.all([
          tokenIn.balanceOf(userAddress),
          tokenIn.decimals()
        ]);

        return {
          raw: balInRaw,
          decimals: decIn,
          formatted: ethers.utils.formatUnits(balInRaw, decIn)
        };
      }

      async function getRequiredApprovalState() {
        if (!provider || !userAddress) return { needsApproval: false, tokenLabel: null };

        const amountInput = document.getElementById("amountIn");
        if (!amountInput) return { needsApproval: false, tokenLabel: null };

        const amountText = normalizeAmountInput(amountInput.value);
        if (!amountText || Number(amountText) <= 0) {
          return { needsApproval: false, tokenLabel: null };
        }

        const tokenInAddress = getTokenInAddress();
        const tokenIn = new ethers.Contract(tokenInAddress, ERC20_ABI, provider);
        const decIn = await tokenIn.decimals();
        const amountIn = ethers.utils.parseUnits(amountText, decIn);
        const currentAllowance = await tokenIn.allowance(userAddress, PAIR_ADDRESS);

        return {
          needsApproval: currentAllowance.lt(amountIn),
          tokenLabel: getTokenInLabel(),
          amountIn
        };
      }

      async function setPercentageAmount(percent) {
        if (!provider || !userAddress) {
          openWalletSheet();
          return;
        }

        if (tokenInBalanceIsZero()) {
          setStatus(getZeroBalanceLabel());
          return;
        }

        try {
          const balanceData = await getTokenInBalance();
          if (!balanceData) return;

          const balanceNum = Number(balanceData.formatted);
          const amountIn = document.getElementById("amountIn");
          if (!amountIn) return;

          if (!balanceNum || balanceNum <= 0) {
            amountIn.value = "";
            await handleAmountInput();
            return;
          }

          let selectedAmount;
          if (percent === 100) selectedAmount = trimMaxAmount(balanceNum, balanceData.decimals);
          else selectedAmount = trimMaxAmount((balanceNum * percent) / 100, balanceData.decimals);

          if (selectedAmount <= 0) {
            amountIn.value = "";
            await handleAmountInput();
            return;
          }

          amountIn.value = formatDisplayNumber(selectedAmount);
          await handleAmountInput();
        } catch (err) {
          console.error(err);
          setStatus("Could not fill the percentage amount.");
        }
      }

      function clearPaymentForm(resetStatus = true) {
        const ids = ["payRecipient", "payUsdcAmount", "payNote"];
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.value = "";
        });

        const recipient = document.getElementById("paySummaryRecipient");
        const receives = document.getElementById("paySummaryReceives");
        const spends = document.getElementById("paySummarySpends");
        const note = document.getElementById("paySummaryNote");
        const box = document.getElementById("paymentSummaryBox");
        const prevGets = document.getElementById("previewRecipientGets");
        const prevPay = document.getElementById("previewYouPay");
        const prevRate = document.getElementById("previewRate");
        const prevBuffer = document.getElementById("previewBuffer");

        if (recipient) recipient.innerText = "-";
        if (receives) receives.innerText = "0 USDC";
        if (spends) spends.innerText = "0 ORBIT";
        if (note) note.innerText = "-";
        if (box) box.classList.remove("show");
        if (prevGets) prevGets.innerText = "0 USDC";
        if (prevPay) prevPay.innerText = "0 ORBIT";
        if (prevRate) prevRate.innerText = currentOrbitToUsdcRate ? `1 ORBIT = ${formatDisplayNumber(currentOrbitToUsdcRate)} USDC` : "-";
        if (prevBuffer) prevBuffer.innerText = "-";

        if (resetStatus) setPaymentStatus("");
        updatePayButton();
      }

      function clearWalletUI() {
        userAddress = null;
        signer = null;
        provider = null;
        isConnecting = false;
        isProcessingSwap = false;
        isProcessingPayment = false;
        currentTokenInBalance = 0;
        currentTokenInDecimals = 18;
        currentOrbitToUsdcRate = 0;
        amountInputFocused = false;

        const idsToClear = {
          walletStatus: "Wallet -",
          balanceIn: "Balance: -",
          balanceOut: "Balance: -",
          priceStatus: "-",
          minReceivedStatus: "-",
          networkStatus: "-",
          orbitTokenBalance: "-",
          orbitTokenPrice: "-",
          usdcTokenBalance: "-"
        };

        Object.entries(idsToClear).forEach(([id, value]) => {
          const el = document.getElementById(id);
          if (el) el.innerText = value;
        });

        const amountIn = document.getElementById("amountIn");
        const amountOut = document.getElementById("amountOut");
        if (amountIn) amountIn.value = "";
        if (amountOut) amountOut.value = "";

        const networkWarning = document.getElementById("networkWarning");
        if (networkWarning) networkWarning.style.display = "none";

        setInputErrorState(false);
        updateQuickAmountsVisibility();
        updateSwapButton();
        updateWalletButton();
        setStatus("Wallet disconnected.");
        setTokenStatus("");
        clearPaymentForm(false);
        setPaymentStatus("Wallet disconnected.");
      }

      async function handleWalletButton() {
        if (isConnecting) return;

        if (userAddress) {
          clearWalletUI();
          closeProfileSheet();
          return;
        }

        openWalletSheet();
      }

      async function connectWalletFromSheet() {
        closeWalletSheet();
        await connectWallet();
      }

      function isWrongNetworkSync() {
        const status = document.getElementById("networkStatus");
        const text = status ? status.innerText || "" : "";
        return text !== "-" && text !== "Arc Testnet";
      }

      function updateDirectionUI() {
        const tokenInIcon = document.getElementById("tokenInIcon");
        const tokenOutIcon = document.getElementById("tokenOutIcon");
        const tokenInText = document.getElementById("tokenInText");
        const tokenOutText = document.getElementById("tokenOutText");
        const amountOut = document.getElementById("amountOut");
        const priceStatus = document.getElementById("priceStatus");
        const minReceivedStatus = document.getElementById("minReceivedStatus");
        const amountIn = document.getElementById("amountIn");

        if (tokenInText) tokenInText.innerText = getTokenInLabel();
        if (tokenOutText) tokenOutText.innerText = getTokenOutLabel();

        if (tokenInIcon) {
          tokenInIcon.src = getTokenInIcon();
          tokenInIcon.alt = getTokenInLabel();
          tokenInIcon.classList.toggle("usdc-big", getTokenInLabel() === "USDC");
        }

        if (tokenOutIcon) {
          tokenOutIcon.src = getTokenOutIcon();
          tokenOutIcon.alt = getTokenOutLabel();
          tokenOutIcon.classList.toggle("usdc-big", getTokenOutLabel() === "USDC");
        }

        if (amountOut) amountOut.value = "";
        if (priceStatus) priceStatus.innerText = "-";
        if (minReceivedStatus) minReceivedStatus.innerText = "-";
        if (amountIn) amountIn.value = "";

        setInputErrorState(false);
        updateQuickAmountsVisibility();
        updateSwapButton();

        if (userAddress) refreshBalances();
      }

      async function updateSwapButton() {
        const amountInput = document.getElementById("amountIn");
        const btn = document.getElementById("swapBtn");
        if (!amountInput || !btn) return;

        const amount = normalizeAmountInput(amountInput.value);

        if (isProcessingSwap) {
          btn.disabled = true;
          btn.innerHTML = "Processing...";
          return;
        }

        if (!userAddress) {
          btn.disabled = false;
          btn.innerHTML = "Connect Wallet";
          return;
        }

        if (isWrongNetworkSync()) {
          btn.disabled = false;
          btn.innerHTML = "Wrong network";
          return;
        }

        if (tokenInBalanceIsZero()) {
          btn.disabled = true;
          btn.innerHTML = getZeroBalanceLabel();
          return;
        }

        if (!amount || Number(amount) <= 0) {
          btn.disabled = true;
          btn.innerHTML = "Enter an amount";
          return;
        }

        const amountNum = Number(amount);
        if (Number.isFinite(amountNum) && amountNum > currentTokenInBalance) {
          btn.disabled = true;
          btn.innerHTML = getInsufficientLabel();
          return;
        }

        try {
          const approvalState = await getRequiredApprovalState();
          if (approvalState.needsApproval) {
            btn.disabled = false;
            btn.innerHTML = `Approve ${approvalState.tokenLabel}`;
            return;
          }
        } catch (err) {
          console.error(err);
        }

        btn.disabled = false;
        btn.innerHTML = `Swap ${getTokenInLabel()} for ${getTokenOutLabel()}`;
      }
    </script>
  </div>
</body>
  </html>
